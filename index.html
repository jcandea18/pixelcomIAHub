<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixelcom · Marketing AI Hub</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F9FC;
    --surface: #FFFFFF;
    --surface2: #F1F5F9;
    --border: #E2E8F0;
    --border-strong: #CBD5E1;
    --text: #0F172A;
    --text-muted: #475569;
    --text-faint: #94A3B8;
    --accent: #D4141D;         /* Pixelcom red-ish */
    --accent-light: #FDECEC;   /* soft red tint */
    --accent-dark: #A30F15;
    --warn: #B45309;
    --warn-light: #FFF7ED;
    --radius: 12px;
    --radius-lg: 18px;
  }

  body {
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* Header */
  .header {
    background: var(--surface);
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--border);
    border-top: 6px solid var(--accent);
  }
  .header-logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .header-logo img {
    height: 24px;
    width: auto;
    display: block;
  }
  .header-logo .product {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3px;
    color: var(--text-muted);
    border-left: 1px solid var(--border);
    padding-left: 10px;
  }
  .header-badge {
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    border: 1px solid rgba(212,20,29,0.28);
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    background: var(--accent-light);
  }

  /* Layout */
  .layout { display: flex; min-height: calc(100vh - 64px); }

  /* Sidebar */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--surface);
    padding: 18px 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
    border-right: 1px solid var(--border);
  }
  .sidebar-section {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.2px;
    color: var(--text-faint);
    padding: 0 20px;
    margin: 16px 0 8px;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    border-left: 3px solid transparent;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 400;
    user-select: none;
  }
  .sidebar-item:hover { background: #F8FAFC; color: var(--text); }
  .sidebar-item.active {
    background: var(--accent-light);
    border-left-color: var(--accent);
    color: var(--accent-dark);
    font-weight: 600;
  }
  .sidebar-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  /* Main */
  .main { flex: 1; padding: 32px 40px; overflow-y: auto; max-width: 1040px; }

  /* Module header */
  .module-header { margin-bottom: 28px; }
  .module-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.8px;
    color: var(--accent);
    background: var(--accent-light);
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  .module-title {
    font-size: 30px;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 8px;
    font-weight: 600;
    letter-spacing: -0.4px;
  }
  .module-desc { font-size: 14px; color: var(--text-muted); line-height: 1.7; max-width: 620px; }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    margin-bottom: 20px;
  }
  .card-title {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.6px;
    color: var(--text-muted);
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  /* Form */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid.cols-1 { grid-template-columns: 1fr; }
  .form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; font-weight: 500; color: var(--text-muted); }
  .field input, .field select, .field textarea {
    font-family: inherit;
    font-size: 13px;
    padding: 9px 12px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent);
    background: #fff;
  }
  .field textarea { resize: vertical; min-height: 80px; }

  /* Buttons */
  .btn {
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 20px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent-dark); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border-strong);
  }
  .btn-secondary:hover { background: var(--border); }

  /* Output */
  .output-card {
    background: linear-gradient(180deg, #111827 0%, #0B1220 100%);
    border-radius: var(--radius-lg);
    padding: 24px;
    margin-top: 20px;
    position: relative;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .output-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    color: #FF6B6B;
    margin-bottom: 14px;
  }
  .output-text {
    font-size: 13px;
    color: #E8E6E0;
    line-height: 1.75;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .output-actions {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .btn-copy {
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: #B4B2A9;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-copy:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .btn-copy.copied { color: #5DCAA5; border-color: #5DCAA5; }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #FF6B6B;
    font-size: 13px;
    padding: 20px 0;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,107,107,0.22);
    border-top-color: #FF6B6B;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Stats row */
  .stats-row {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
  }
  .stat-label { font-size: 11px; color: var(--text-faint); margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 500; color: var(--text); }
  .stat-sub { font-size: 11px; color: var(--accent); margin-top: 2px; }

  /* Segment pills */
  .pills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .pill {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border-strong);
    cursor: pointer;
    transition: all 0.12s;
    background: var(--bg);
    color: var(--text-muted);
    user-select: none;
  }
  .pill.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 500;
  }
  .pill:hover:not(.selected) { border-color: var(--accent); color: var(--accent); }

  /* Divider */
  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* History */
  .history-item {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: background 0.12s;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .history-item:hover { background: var(--border); }
  .history-preview { font-size: 12px; color: var(--text-muted); line-height: 1.5; flex: 1; }
  .history-meta { font-size: 11px; color: var(--text-faint); white-space: nowrap; }

  /* Responsive tweak */
  @media (max-width: 700px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-grid.cols-3 { grid-template-columns: 1fr 1fr; }
    .main { padding: 20px; }
    .stats-row { flex-wrap: wrap; }
  }

  .output-header-row { margin-bottom: 10px; }
  .email-subject-preview {
    margin-top: 10px;
    padding: 10px 12px;
    border-radius: var(--radius);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 13px;
    color: #E8E6E0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .email-subject-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.8px;
    color: #94a3b8;
    text-transform: uppercase;
  }

  .output-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;
  }
  .output-tab {
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.14);
    background: rgba(255,255,255,0.05);
    color: #b4b2a9;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .output-tab:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .output-tab.active {
    border-color: #ff6b6b;
    color: #fff;
    background: rgba(255,107,107,0.12);
  }

  .preview-frame {
    width: 100%;
    min-height: 360px;
    border: 0;
    border-radius: 10px;
    background: #fff;
    display: block;
  }
  .output-code {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    font-size: 11px;
    line-height: 1.5;
    color: #c9d1d9;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 14px;
    overflow: auto;
    max-height: 480px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .output-plain {
    background: rgba(0,0,0,0.25);
    border-radius: 10px;
    padding: 16px;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .webhook-status { font-size: 12px; margin-top: 10px; }
  .webhook-status.ok { color: #5dcaa5; }
  .webhook-status.err { color: #f09595; }

  /* Lead scoring — misma línea visual (variables, cards, acento) */
  .ls-subnav {
    display: flex;
    gap: 0;
    margin-bottom: 24px;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--surface);
  }
  .ls-subnav button {
    flex: 1;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 12px 16px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .ls-subnav button:hover { background: var(--surface2); color: var(--text); }
  .ls-subnav button.active {
    background: var(--accent);
    color: #fff;
  }

  .ls-pipeline-col { margin-bottom: 28px; }
  .ls-pipeline-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--accent);
  }

  .ls-lead-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .ls-lead-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
    transition: background 0.12s;
  }
  .ls-lead-head:hover { background: #F8FAFC; }
  .ls-lead-title { font-weight: 600; color: var(--text); }
  .ls-lead-meta { font-size: 11px; color: var(--text-faint); margin-top: 4px; }
  .ls-lead-score { font-size: 20px; font-weight: 700; color: var(--text); }
  .ls-tier-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
  .ls-lead-body {
    border-top: 1px solid var(--border);
    padding: 14px 16px;
    background: var(--surface2);
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.65;
  }
  .ls-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    margin-top: 10px;
  }
  .ls-table th, .ls-table td {
    border: 1px solid var(--border);
    padding: 8px 10px;
    text-align: left;
  }
  .ls-table th { background: var(--surface); color: var(--text-muted); font-weight: 600; }
  .ls-actions-row { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; }
  .ls-link-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: underline;
    padding: 0;
  }
  .ls-link-btn:hover { color: var(--accent-dark); }

  .ls-score-head {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 18px;
  }
  .ls-score-num { font-size: 42px; font-weight: 600; color: var(--text); line-height: 1; letter-spacing: -0.03em; }
  .ls-follow { font-size: 13px; color: var(--text-muted); }
  .ls-est-val { font-size: 13px; color: var(--accent); font-weight: 600; }

  .ls-bar-track {
    height: 14px;
    border-radius: 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .ls-bar-fill {
    height: 100%;
    width: 0%;
    border-radius: 6px;
    transition: width 1.1s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .ls-tier-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
  }

  .ls-approach {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-top: 16px;
    font-size: 13px;
    line-height: 1.65;
    color: var(--text-muted);
  }
  .ls-approach h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); margin-bottom: 8px; }

  .ls-priority-list { margin: 0; padding-left: 18px; color: var(--text); }
  .ls-priority-list li { margin-bottom: 6px; }

  .ls-empty-hint { font-size: 13px; color: var(--text-faint); }
  .ls-error-card { border-color: rgba(212, 20, 29, 0.28) !important; background: var(--accent-light) !important; margin-top: 16px; }
  .ls-error-title { color: var(--accent) !important; }
  .ls-error-text { font-size: 13px; color: var(--accent-dark); }
  .ls-points-pos { font-weight: 600; color: var(--accent-dark); }
  .ls-points-neg { font-weight: 600; color: var(--warn); }

  .card.ls-score-panel { margin-top: 20px; }

  /* Histórico */
  .hist-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 18px;
  }
  .hist-filter-btn {
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .hist-filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .hist-filter-btn.on { background: var(--accent-light); border-color: var(--accent); color: var(--accent-dark); font-weight: 600; }
  .hist-row {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    margin-bottom: 8px;
    overflow: hidden;
  }
  .hist-row-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 14px;
    cursor: pointer;
  }
  .hist-row-head:hover { background: #FAFBFC; }
  .hist-type-pill {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    background: var(--accent-light);
    padding: 2px 8px;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 4px;
  }
  .hist-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .hist-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .hist-date { font-size: 11px; color: var(--text-faint); white-space: nowrap; }
  .hist-body { border-top: 1px solid var(--border); padding: 14px; background: var(--bg); font-size: 12px; }
  .hist-snippet { color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; }
  .hist-preview-box {
    background: #0B1220;
    border-radius: 8px;
    padding: 0;
    margin-top: 8px;
    max-height: 360px;
    overflow: auto;
  }
  .hist-preview-box iframe { width: 100%; min-height: 240px; border: none; }

  /* CRM */
  .crm-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .crm-table th, .crm-table td {
    text-align: left;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
  }
  .crm-table th { color: var(--text-faint); font-weight: 500; text-transform: uppercase; font-size: 10px; letter-spacing: 0.06em; }
  .crm-table tr:hover td { background: #FAFBFC; }
  .crm-actions { display: flex; flex-wrap: wrap; gap: 6px; }
  .crm-enrich-box {
    margin-top: 10px;
    padding: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 12px;
  }
  .crm-enrich-kv { margin-bottom: 8px; }
  .crm-enrich-kv strong { color: var(--text-muted); display: block; font-size: 10px; text-transform: uppercase; margin-bottom: 2px; }
  .crm-enrich-list { margin: 0; padding-left: 16px; }
  .crm-enrich-list li { margin-bottom: 4px; }
  .crm-badge-enc { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
  .crm-enc-alto { background: #D1FAE5; color: #047857; }
  .crm-enc-medio { background: #FEF3C7; color: #B45309; }
  .crm-enc-bajo { background: #F1F5F9; color: #64748B; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;

const OUTPUT_LANGS = [
  { value: 'frances', label: 'Francés' },
  { value: 'ingles', label: 'Inglés' },
  { value: 'espanol', label: 'Español' },
  { value: 'aleman', label: 'Alemán' },
  { value: 'italiano', label: 'Italiano' },
  { value: 'portugues', label: 'Portugués' },

// ── Anthropic API call ──────────────────────────────────────────
async function callClaude(apiKey, systemPrompt, userPrompt) {
  const res = await fetch('/api/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      systemPrompt,
      userPrompt
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `Error ${res.status}`);
  }
  const data = await res.json();
  return data.text || '';
}

function stripJsonFences(s) {
  let t = (s || '').trim();
  const m = t.match(/^```(?:json)?\s*([\s\S]*?)\s*```$/im);
  if (m) t = m[1].trim();
  return t;
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function stripHtmlTags(html) {
  return String(html || '')
    .replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi, '')
    .replace(/<style[\s\S]*?>[\s\S]*?<\/style>/gi, '')
    .replace(/<[^>]+>/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function parseEmailJson(raw) {
  if (!raw) return null;
  const t = stripJsonFences(raw);
  try {
    const j = JSON.parse(t);
    if (j && typeof j.subject === 'string' && typeof j.html === 'string') {
      return {
        subject: j.subject,
        html: j.html,
        text: typeof j.text === 'string' ? j.text : stripHtmlTags(j.html)
      };
    }
  } catch (_) {}
  return null;
}

function wrapPreviewDoc(bodyHtml) {
  return `<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; font-size: 15px; line-height: 1.55; color: #0f172a; padding: 20px; max-width: 720px; margin: 0 auto; background: #fff; }
    h1,h2,h3 { line-height: 1.25; }
    a { color: #c41e24; }
  </style></head><body>${bodyHtml}</body></html>`;
}

function coerceContentToHtml(raw) {
  const t = (raw || '').trim();
  if (!t) return '<p></p>';
  if (/<[a-z][\s\S]*>/i.test(t)) return t;
  return t
    .split(/\n\n+/)
    .map((block) => {
      const withBr = block.split(/\n/).map((l) => escapeHtml(l)).join('<br/>');
      return `<p>${withBr}</p>`;
    })
    .join('');
}

// ── Copy button ────────────────────────────────────────────────
function CopyBtn({ text }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };
  return (
    <button className={`btn-copy ${copied ? 'copied' : ''}`} onClick={copy}>
      {copied ? '✓ Copiado' : 'Copiar texto'}
    </button>
  );
}

// ── Output block (vista previa HTML + pestañas) ─────────────────
function OutputBlock({ result, loading, error, variant = 'article' }) {
  const [tab, setTab] = useState('preview');
  const [htmlCopied, setHtmlCopied] = useState(false);

  const emailPayload = useMemo(() => {
    if (variant !== 'email' || !result) return null;
    return parseEmailJson(result);
  }, [variant, result]);

  const htmlSource = useMemo(() => {
    if (!result) return '';
    if (variant === 'email' && emailPayload) return emailPayload.html;
    return coerceContentToHtml(result);
  }, [variant, result, emailPayload]);

  const previewSrcDoc = useMemo(() => wrapPreviewDoc(htmlSource || '<p></p>'), [htmlSource]);

  const plainText = useMemo(() => {
    if (variant === 'email' && emailPayload) return emailPayload.text || stripHtmlTags(emailPayload.html);
    return stripHtmlTags(coerceContentToHtml(result || ''));
  }, [variant, result, emailPayload]);

  const copyHtml = () => {
    navigator.clipboard.writeText(htmlSource).then(() => {
      setHtmlCopied(true);
      setTimeout(() => setHtmlCopied(false), 2000);
    });
  };

  if (loading) return (
    <div className="output-card">
      <div className="loading">
        <div className="spinner" />
        Generando con IA...
      </div>
    </div>
  );
  if (error) return (
    <div className="output-card" style={{borderLeft:'3px solid #E24B4A'}}>
      <div className="output-label" style={{color:'#E24B4A'}}>ERROR</div>
      <div className="output-text" style={{color:'#F09595'}}>{error}</div>
    </div>
  );
  if (!result) return null;

  if (variant === 'email' && !emailPayload) {
    return (
      <div className="output-card" style={{borderLeft:'3px solid #f59e0b'}}>
        <div className="output-label" style={{color:'#fbbf24'}}>RESPUESTA NO VÁLIDA</div>
        <div className="output-text" style={{fontSize:12,color:'#cbd5e1'}}>
          Se esperaba un JSON con <code style={{color:'#fff'}}>subject</code>, <code style={{color:'#fff'}}>html</code> y <code style={{color:'#fff'}}>text</code>. Respuesta cruda:
        </div>
        <pre className="output-code" style={{marginTop:12}}>{result}</pre>
        <div className="output-actions">
          <CopyBtn text={result} />
        </div>
      </div>
    );
  }

  return (
    <div className="output-card">
      <div className="output-header-row">
        <div className="output-label">RESULTADO</div>
        {variant === 'email' && emailPayload?.subject && (
          <div className="email-subject-preview">
            <span className="email-subject-label">Asunto del correo</span>
            <span>{emailPayload.subject}</span>
          </div>
        )}
      </div>

      <div className="output-tabs">
        <button type="button" className={`output-tab ${tab === 'preview' ? 'active' : ''}`} onClick={() => setTab('preview')}>Vista previa</button>
        <button type="button" className={`output-tab ${tab === 'html' ? 'active' : ''}`} onClick={() => setTab('html')}>HTML / fuente</button>
        <button type="button" className={`output-tab ${tab === 'plain' ? 'active' : ''}`} onClick={() => setTab('plain')}>Texto plano</button>
      </div>

      {tab === 'preview' && (
        <iframe className="preview-frame" title="Vista previa" sandbox srcDoc={previewSrcDoc} />
      )}
      {tab === 'html' && (
        <pre className="output-code">{htmlSource}</pre>
      )}
      {tab === 'plain' && (
        <div className="output-text output-plain">{plainText}</div>
      )}

      <div className="output-actions">
        <CopyBtn text={plainText} />
        <button type="button" className={`btn-copy ${htmlCopied ? 'copied' : ''}`} onClick={copyHtml}>
          {htmlCopied ? '✓ HTML copiado' : 'Copiar HTML'}
        </button>
      </div>
    </div>
  );
}

// MÓDULO 3 — Newsletter segmentada
// ══════════════════════════════════════════════════════════════
function Module3({ apiKey }) {
  const [outputLanguage, setOutputLanguage] = useState('frances');
  const [segmentos, setSegmentos] = useState(['timing_fr']);
  const [temas, setTemas] = useState('');
  const [novedad, setNovedad] = useState('');
  const [cta, setCta] = useState('demo');
  const [result, setResult] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const allSegmentos = [
    { value: 'timing_fr', label: 'Clientes Pixeltiming — Francia', color: 'teal' },
    { value: 'timing_eu', label: 'Clientes Pixeltiming — Europa', color: 'teal' },
    { value: 'motorsport_eu', label: 'Clientes Pixelmotorsport — Europa', color: 'coral' },
    { value: 'prospects_fr', label: 'Prospectos cualificados — Francia', color: 'amber' },
    { value: 'prospects_en', label: 'Prospectos cualificados — Anglosajón', color: 'amber' },
  ];

  const toggleSeg = (v) => setSegmentos(s => s.includes(v) ? s.filter(x=>x!==v) : [...s,v]);

  const ctas = [
    { value: 'demo', label: 'Solicitar demostración' },
    { value: 'llamada', label: 'Agendar llamada' },
    { value: 'descarga', label: 'Descargar documentación' },
    { value: 'feria', label: 'Visitarnos en feria' },
  ];

  const generate = async () => {
    if (!temas) { setError('Describe los temas de la newsletter.'); return; }
    if (segmentos.length === 0) { setError('Selecciona al menos un segmento.'); return; }
    setLoading(true); setError(''); setResult('');

    const segLabels = segmentos.map(s=>allSegmentos.find(a=>a.value===s)?.label).join(', ');
    const ctaLabel = ctas.find(c=>c.value===cta)?.label;
    const idiomaLabel = outputLanguageLabel(outputLanguage);

    const system = `Eres experto en email marketing B2B para Pixelcom Ingeniería, empresa española de tecnología deportiva (Pixeltiming para karting, Pixelmotorsport para circuitos de velocidad). Redactas newsletters profesionales en ${idiomaLabel} que mezclan novedades técnicas, noticias del sector y llamadas a la acción claras. Tono cercano, técnico y orientado a negocio. Nunca uses jerga de marketing genérica.`;

    const user = `Redacta una newsletter mensual en ${idiomaLabel} para el siguiente segmento: ${segLabels}.

Temas a incluir: ${temas}
${novedad ? `Novedad de producto destacada: ${novedad}` : ''}
Llamada a la acción principal: ${ctaLabel}

Estructura:
1. Asunto del email (2 opciones)
2. Saludo personalizado
3. Introducción (2-3 líneas)
4. Sección 1: novedad o contenido principal
5. Sección 2: noticia del sector o referencia de cliente
6. Sección 3 (opcional): recurso útil o tip técnico
7. Llamada a la acción clara
8. Cierre y firma

Longitud total: 250-350 palabras.

Entrega el resultado ÚNICAMENTE como fragmento HTML (sin markdown, sin bloques de código): usa h1 para el título principal, h2/h3 para secciones, p, ul/ol/li, strong, em. Incluye al inicio un bloque con <strong>Opciones de asunto</strong> y dos <p> con cada asunto. No uses <script>.`;

    try {
      const text = await callClaude(apiKey, system, user);
      setResult(text);
      logActivity('newsletter', 'generate', { segmentos, outputLanguage });
      persistGenerated({
        kind: 'newsletter',
        outputLanguage,
        input: { segmentos, temas, novedad, cta },
        bodyHtml: text
      });
    } catch(e) { setError(e.message); }
    setLoading(false);
  };

  return (
    <div>
      <div className="module-header">
        <div className="module-tag">CASO DE USO 3 · NEWSLETTER</div>
        <div className="module-title">Newsletter segmentada</div>
        <div className="module-desc">Elige el idioma de salida en el bloque de contenido. Vista previa HTML por segmento.</div>
      </div>

      <div className="stats-row">
        <div className="stat-card">
          <div className="stat-label">Newsletters actuales</div>
          <div className="stat-value">0</div>
          <div className="stat-sub">comunicación reactiva</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Objetivo</div>
          <div className="stat-value">3-5</div>
          <div className="stat-sub">newsletters/mes por segmento</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Tiempo de producción</div>
          <div className="stat-value">45 min</div>
          <div className="stat-sub">briefing + revisión</div>
        </div>
      </div>

      <div className="card">
        <div className="card-title">Segmento de destinatarios</div>
        <div className="pills">
          {allSegmentos.map(s => (
            <div key={s.value} className={`pill ${segmentos.includes(s.value)?'selected':''}`}
              onClick={()=>toggleSeg(s.value)}>
              {s.label}
            </div>
          ))}
        </div>
      </div>

      <div className="card">
        <div className="card-title">Contenido de la newsletter</div>
        <div className="form-grid cols-1">
          <div className="field">
            <label>Temas a incluir este mes *</label>
            <textarea value={temas} onChange={e=>setTemas(e.target.value)}
              placeholder="Actualización del software Pixeltiming v4.2 con nuevas funciones de gestión de grupos, noticia del sector sobre apertura de nuevos kartings en Francia, anuncio de presencia en feria Offenbach en enero..." />
          </div>
          <div className="field">
            <label>Novedad de producto destacada (opcional)</label>
            <input value={novedad} onChange={e=>setNovedad(e.target.value)}
              placeholder="Nueva funcionalidad de control remoto de karts desde app móvil" />
          </div>
        </div>
        <div className="form-grid" style={{marginTop:14}}>
          <div className="field">
            <label>Llamada a la acción principal</label>
            <select value={cta} onChange={e=>setCta(e.target.value)}>
              {ctas.map(c=><option key={c.value} value={c.value}>{c.label}</option>)}
            </select>
          </div>
          <div className="field">
            <label>Idioma de salida</label>
            <select value={outputLanguage} onChange={(e) => setOutputLanguage(e.target.value)}>
              {OUTPUT_LANGS.map((l) => (
                <option key={l.value} value={l.value}>{l.label}</option>
              ))}
            </select>
          </div>
        </div>
      </div>

      <button className="btn btn-primary" onClick={generate} disabled={loading}>
        {loading ? 'Generando...' : 'Generar newsletter'}
      </button>

      <OutputBlock result={result} loading={loading} error={error} variant="article" />
    </div>
  );
}

// MÓDULO 4 — Scoring de leads + pipeline
// ══════════════════════════════════════════════════════════════
function Module4() {
  const [view, setView] = useState('evaluar');
  const [form, setForm] = useState({
    nombre: '', empresa: '', pais: 'Francia', tipo: 'nueva_karting', producto: 'pixeltiming_completo',
    canal: 'referencia', urgencia: 'lt3', presupuesto: 'gt50', cliente_existente: 'no', notas: ''
  });
  const [senales_negativas, setSenales] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [lastResult, setLastResult] = useState(null);
  const [barWidth, setBarWidth] = useState(0);
  const [leads, setLeads] = useState([]);
  const [expanded, setExpanded] = useState({});
  /** null = cargando API; true = Neon; false = solo localStorage */
  const [pipelineDb, setPipelineDb] = useState(null);

  const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const res = await fetch('/api/leads');
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error('api');
        if (!cancelled && Array.isArray(data.leads)) {
          setLeads(data.leads);
          setPipelineDb(true);
          return;
        }
      } catch {
        /* fallback local */
      }
      if (!cancelled) {
        try {
          const raw = localStorage.getItem(LS_STORAGE_KEY);
          setLeads(raw ? JSON.parse(raw) : []);
        } catch {
          setLeads([]);
        }
        setPipelineDb(false);
      }
    })();
    return () => {
      cancelled = true;
    };
  }, []);

  useEffect(() => {
    if (!lastResult) {
      setBarWidth(0);
      return;
    }
    setBarWidth(0);
    const t = setTimeout(() => setBarWidth(lastResult.score), 70);
    return () => clearTimeout(t);
  }, [lastResult]);

  const SENALES_OPTS = [
    { v: 'solo_precio', label: 'Solo pide precio' },
    { v: 'competidor', label: 'Tiene sistema competidor' },
    { v: 'logistica', label: 'Logística compleja' },
    { v: 'no_decisor', label: 'No es el decisor' },
  ];

  const toggleSenal = (v) => {
    setSenales((s) => (s.includes(v) ? s.filter((x) => x !== v) : [...s, v]));
  };

  const buildLeadPayload = () => ({
    nombre: form.nombre.trim(),
    empresa: form.empresa.trim(),
    pais: form.pais,
    tipo: form.tipo,
    producto: form.producto,
    canal: form.canal,
    urgencia: form.urgencia,
    presupuesto: form.presupuesto,
    cliente_existente: form.cliente_existente,
    notas: form.notas.trim(),
    senales_negativas
  });

  const scoreNow = async () => {
    if (!form.nombre.trim() || !form.empresa.trim()) {
      setError('Nombre y empresa son obligatorios.');
      return;
    }
    setLoading(true);
    setError('');
    setLastResult(null);
    try {
      const r = await fetchLeadScore(buildLeadPayload());
      setLastResult(r);
      logActivity('scoring', 'score', {
        score: r.score,
        tier: r.tier,
        empresa: form.empresa.trim()
      });
    } catch (e) {
      setError(e.message || 'Error al calcular el score.');
    }
    setLoading(false);
  };

  const addToPipeline = async () => {
    if (!lastResult) return;
    if (pipelineDb === true) {
      try {
        const res = await fetch('/api/leads', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nombre: form.nombre.trim(),
            empresa: form.empresa.trim(),
            lead: buildLeadPayload(),
            result: lastResult
          })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error?.message || `Error ${res.status}`);
        if (data.entry) {
          setLeads((prev) => [data.entry, ...prev]);
          logActivity('scoring', 'pipeline_add', {
            id: data.entry.id,
            score: lastResult.score
          });
        }
      } catch (err) {
        setError(err.message || 'No se pudo guardar el lead en la base de datos.');
      }
      return;
    }
    const id =
      typeof crypto !== 'undefined' && crypto.randomUUID
        ? crypto.randomUUID()
        : String(Date.now()) + Math.random().toString(16).slice(2);
    const entry = {
      id,
      createdAt: Date.now(),
      nombre: form.nombre.trim(),
      empresa: form.empresa.trim(),
      lead: buildLeadPayload(),
      result: lastResult
    };
    setLeads((prev) => {
      const next = [entry, ...prev];
      try { localStorage.setItem(LS_STORAGE_KEY, JSON.stringify(next)); } catch (_) {}
      return next;
    });
    logActivity('scoring', 'pipeline_add_local', { id: entry.id, score: lastResult.score });
  };

  const removeLead = async (id, e) => {
    e.stopPropagation();
    if (pipelineDb === true) {
      try {
        const res = await fetch(`/api/leads?id=${encodeURIComponent(id)}`, {
          method: 'DELETE'
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error?.message || `Error ${res.status}`);
        setLeads((prev) => prev.filter((x) => x.id !== id));
        logActivity('scoring', 'pipeline_remove', { id });
      } catch (err) {
        setError(err.message || 'No se pudo eliminar el lead.');
      }
      setExpanded((ex) => {
        const n = { ...ex };
        delete n[id];
        return n;
      });
      return;
    }
    setLeads((prev) => {
      const next = prev.filter((x) => x.id !== id);
      try { localStorage.setItem(LS_STORAGE_KEY, JSON.stringify(next)); } catch (_) {}
      return next;
    });
    setExpanded((ex) => {
      const n = { ...ex };
      delete n[id];
      return n;
    });
    logActivity('scoring', 'pipeline_remove_local', { id });
  };

  const stats = useMemo(() => {
    const n = leads.length;
    const hot = leads.filter((l) => l.result.tier === 'HOT').length;
    const warm = leads.filter((l) => l.result.tier === 'WARM').length;
    const avg = n ? Math.round(leads.reduce((a, l) => a + l.result.score, 0) / n) : 0;
    return { n, hot, warm, avg };
  }, [leads]);

  const grouped = useMemo(() => {
    const today = [];
    const week = [];
    const low = [];
    for (const L of leads) {
      const b = lsBucket(L.result);
      if (b === 'today') today.push(L);
      else if (b === 'week') week.push(L);
      else low.push(L);
    }
    const sortFn = (a, b) => b.result.score - a.result.score;
    today.sort(sortFn);
    week.sort(sortFn);
    low.sort(sortFn);
    return { today, week, low };
  }, [leads]);

  const toggleExpand = (id) => {
    setExpanded((ex) => ({ ...ex, [id]: !ex[id] }));
  };

  const renderLeadCard = (L) => {
    const r = L.result;
    const open = !!expanded[L.id];
    const col = lsTierColor(r.tier);
    return (
      <div key={L.id} className="ls-lead-card">
        <div className="ls-lead-head" onClick={() => toggleExpand(L.id)}>
          <div>
            <div className="ls-lead-title">{L.nombre} · {L.empresa}</div>
            <div className="ls-lead-meta">
              <span className="ls-tier-dot" style={{ background: col }} />
              {r.tier} · {r.tier_label} · seguimiento en {r.follow_up_days} días · {r.estimated_value}
            </div>
          </div>
          <div className="ls-lead-score" style={{ color: col }}>{r.score}</div>
        </div>
        {open && (
          <div className="ls-lead-body">
            <table className="ls-table">
              <thead><tr><th>Criterio</th><th>Puntos</th><th>Motivo</th></tr></thead>
              <tbody>
                {(r.breakdown || []).map((row, i) => (
                  <tr key={i}>
                    <td>{row.category}</td>
                    <td className={row.points < 0 ? 'ls-points-neg' : 'ls-points-pos'}>{row.points > 0 ? '+' : ''}{row.points}</td>
                    <td>{row.reason}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div style={{ marginTop: 14 }}>
              <strong>Acciones prioritarias</strong>
              <ul className="ls-priority-list">
                {(r.priority_actions || []).map((a, i) => (
                  <li key={i}>{a}</li>
                ))}
              </ul>
            </div>
            <div className="ls-approach">
              <h4>Enfoque recomendado</h4>
              {r.recommended_approach}
            </div>
            <div className="ls-actions-row">
              <button type="button" className="ls-link-btn" onClick={(e) => removeLead(L.id, e)}>Eliminar del pipeline</button>
            </div>
          </div>
        )}
      </div>
    );
  };

  return (
    <div>
      <div className="module-header">
        <div className="module-tag">COMERCIAL · SCORING</div>
        <div className="module-title">Scoring de leads</div>
        <div className="module-desc">Motor de puntuación 0–100 con desglose, tier y acciones recomendadas. Los leads guardados se agrupan en el pipeline local (navegador).</div>
      </div>

      <div className="ls-subnav">
        <button type="button" className={view === 'evaluar' ? 'active' : ''} onClick={() => setView('evaluar')}>Evaluar lead</button>
        <button type="button" className={view === 'pipeline' ? 'active' : ''} onClick={() => setView('pipeline')}>Pipeline</button>
      </div>
      <p style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 18, lineHeight: 1.5 }}>
        {pipelineDb === null && 'Comprobando almacenamiento…'}
        {pipelineDb === true && 'Pipeline sincronizado con Neon (PostgreSQL). Los eventos de uso se registran en la tabla app_events.'}
        {pipelineDb === false && 'Sin conexión a la base de datos: el pipeline solo existe en este navegador (localStorage). Configura DATABASE_URL en local o NETLIFY_DATABASE_URL en Netlify.'}
      </p>

      {view === 'pipeline' && (
        <>
          <div className="stats-row">
            <div className="stat-card"><div className="stat-label">Total leads</div><div className="stat-value">{stats.n}</div></div>
            <div className="stat-card"><div className="stat-label">HOT</div><div className="stat-value" style={{ color: '#5DCAA5' }}>{stats.hot}</div></div>
            <div className="stat-card"><div className="stat-label">WARM</div><div className="stat-value" style={{ color: '#FAC775' }}>{stats.warm}</div></div>
            <div className="stat-card"><div className="stat-label">Score medio</div><div className="stat-value">{stats.avg}</div></div>
          </div>
          <div className="ls-pipeline-col">
            <div className="ls-pipeline-title">Actuar hoy</div>
            {grouped.today.length === 0 && <div className="ls-empty-hint">Sin leads en este bloque.</div>}
            {grouped.today.map(renderLeadCard)}
          </div>
          <div className="ls-pipeline-col">
            <div className="ls-pipeline-title">Seguimiento esta semana</div>
            {grouped.week.length === 0 && <div className="ls-empty-hint">Sin leads en este bloque.</div>}
            {grouped.week.map(renderLeadCard)}
          </div>
          <div className="ls-pipeline-col">
            <div className="ls-pipeline-title">Baja prioridad</div>
            {grouped.low.length === 0 && <div className="ls-empty-hint">Sin leads en este bloque.</div>}
            {grouped.low.map(renderLeadCard)}
          </div>
        </>
      )}

      {view === 'evaluar' && (
        <>
          <div className="card">
            <div className="card-title">Datos del lead</div>
            <div className="form-grid">
              <div className="field"><label>Nombre *</label><input value={form.nombre} onChange={(e) => set('nombre', e.target.value)} /></div>
              <div className="field"><label>Empresa *</label><input value={form.empresa} onChange={(e) => set('empresa', e.target.value)} /></div>
              <div className="field">
                <label>País</label>
                <select value={form.pais} onChange={(e) => set('pais', e.target.value)}>
                  <option>Francia</option><option>España</option><option>UK</option><option>USA</option><option>Alemania</option><option>Otros</option>
                </select>
              </div>
              <div className="field">
                <label>Tipo</label>
                <select value={form.tipo} onChange={(e) => set('tipo', e.target.value)}>
                  <option value="nueva_karting">Nueva apertura karting</option>
                  <option value="renovacion">Renovación</option>
                  <option value="circuito">Circuito velocidad</option>
                  <option value="consultor">Consultor</option>
                  <option value="admin">Admin. pública</option>
                </select>
              </div>
              <div className="field">
                <label>Producto</label>
                <select value={form.producto} onChange={(e) => set('producto', e.target.value)}>
                  <option value="pixeltiming_completo">Pixeltiming completo</option>
                  <option value="solo_sw">Solo SW</option>
                  <option value="pixelmotorsport">Pixelmotorsport</option>
                  <option value="ambas">Ambas</option>
                  <option value="sin_definir">Sin definir</option>
                </select>
              </div>
              <div className="field">
                <label>Canal</label>
                <select value={form.canal} onChange={(e) => set('canal', e.target.value)}>
                  <option value="referencia">Referencia cliente</option>
                  <option value="feria">Feria sectorial</option>
                  <option value="web">Web orgánica</option>
                  <option value="linkedin">LinkedIn</option>
                  <option value="cold">Cold contact</option>
                </select>
              </div>
              <div className="field">
                <label>Urgencia</label>
                <select value={form.urgencia} onChange={(e) => set('urgencia', e.target.value)}>
                  <option value="lt3">&lt; 3 meses</option>
                  <option value="3_6">3-6 meses</option>
                  <option value="6_12">6-12 meses</option>
                  <option value="sin">Sin definir</option>
                </select>
              </div>
              <div className="field">
                <label>Presupuesto</label>
                <select value={form.presupuesto} onChange={(e) => set('presupuesto', e.target.value)}>
                  <option value="gt50">&gt; 50k€</option>
                  <option value="20_50">20-50k€</option>
                  <option value="10_20">10-20k€</option>
                  <option value="lt10">&lt; 10k€</option>
                  <option value="desc">Desconocido</option>
                </select>
              </div>
              <div className="field">
                <label>Cliente existente</label>
                <select value={form.cliente_existente} onChange={(e) => set('cliente_existente', e.target.value)}>
                  <option value="no">No</option>
                  <option value="activo">Sí activo</option>
                  <option value="inactivo">Sí inactivo</option>
                </select>
              </div>
              <div className="field" style={{ gridColumn: 'span 2' }}>
                <label>Señales negativas</label>
                <div className="pills">
                  {SENALES_OPTS.map((o) => (
                    <div
                      key={o.v}
                      className={`pill ${senales_negativas.includes(o.v) ? 'selected' : ''}`}
                      onClick={() => toggleSenal(o.v)}
                    >
                      {o.label}
                    </div>
                  ))}
                </div>
              </div>
              <div className="field" style={{ gridColumn: 'span 2' }}>
                <label>Notas</label>
                <textarea value={form.notas} onChange={(e) => set('notas', e.target.value)} style={{ minHeight: 72 }} />
              </div>
            </div>
          </div>
          <button type="button" className="btn btn-primary" onClick={scoreNow} disabled={loading}>
            {loading ? 'Calculando…' : 'Calcular score'}
          </button>
          {error && (
            <div className="card ls-error-card">
              <div className="card-title ls-error-title">Error</div>
              <div className="ls-error-text">{error}</div>
            </div>
          )}
          {lastResult && (
            <div className="card ls-score-panel">
              <div className="ls-score-head">
                <div>
                  <div className="ls-tier-badge" style={{ borderColor: lsTierColor(lastResult.tier), color: lsTierColor(lastResult.tier), background: 'var(--surface)' }}>
                    <span className="ls-tier-dot" style={{ background: lsTierColor(lastResult.tier) }} />
                    {lastResult.tier} — {lastResult.tier_label}
                  </div>
                </div>
                <div className="ls-est-val">{lastResult.estimated_value}</div>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 16, flexWrap: 'wrap', marginBottom: 12 }}>
                <div className="ls-score-num">{lastResult.score}</div>
                <div className="ls-follow">Seguimiento sugerido: <strong>{lastResult.follow_up_days}</strong> días</div>
              </div>
              <div className="ls-bar-track">
                <div className="ls-bar-fill" style={{ width: `${barWidth}%`, background: lsScoreBarColor(lastResult.score) }} />
              </div>
              <table className="ls-table">
                <thead><tr><th>Criterio</th><th>Puntos</th><th>Motivo</th></tr></thead>
                <tbody>
                  {(lastResult.breakdown || []).map((row, i) => (
                    <tr key={i}>
                      <td>{row.category}</td>
                      <td className={row.points < 0 ? 'ls-points-neg' : 'ls-points-pos'}>{row.points > 0 ? '+' : ''}{row.points}</td>
                      <td>{row.reason}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div style={{ marginTop: 16 }}>
                <strong>3 acciones prioritarias</strong>
                <ol className="ls-priority-list">
                  {(lastResult.priority_actions || []).map((a, i) => (
                    <li key={i}>{a}</li>
                  ))}
                </ol>
              </div>
              <div className="ls-approach">
                <h4>Enfoque recomendado</h4>
                {lastResult.recommended_approach}
              </div>
              <button type="button" className="btn btn-secondary" style={{ marginTop: 16 }} onClick={addToPipeline} disabled={pipelineDb === null || loading}>
                Añadir al pipeline
              </button>
            </div>
          )}
        </>
      )}
    </div>
  );
}

// MÓDULO — Histórico (generados + pipeline)

function formatHistDate(ts) {
  if (ts == null) return '—';
  const d = new Date(ts);
  if (Number.isNaN(d.getTime())) return '—';
  return d.toLocaleString('es-ES', { dateStyle: 'short', timeStyle: 'short' });
}

function ModuleHistoric() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState('');
  const [filter, setFilter] = useState('all');
  const [openId, setOpenId] = useState(null);
  const [detailHtml, setDetailHtml] = useState(null);
  const [detailLoading, setDetailLoading] = useState(false);

  const load = async () => {
    setLoading(true);
    setErr('');
    try {
      const res = await fetch('/api/activity?limit=300');
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.error?.message || `Error ${res.status}`);
      }
      setItems(Array.isArray(data.items) ? data.items : []);
    } catch (e) {
      setErr(e.message || 'No se pudo cargar el histórico.');
      setItems([]);
    }
    setLoading(false);
  };

  useEffect(() => {
    load();
  }, []);

  const filtered = useMemo(() => {
    if (filter === 'all') return items;
    if (filter === 'generated') return items.filter((i) => i.feedType === 'generated');
    if (filter === 'pipeline_lead') {
      return items.filter((i) => i.feedType === 'pipeline_lead');
    }
    return items.filter(
      (i) => i.feedType === 'generated' && i.subtype === filter
    );
  }, [items, filter]);

  const toggle = async (row) => {
    const rid = `${row.feedType}-${row.id}`;
    if (openId === rid) {
      setOpenId(null);
      setDetailHtml(null);
      setDetailLoading(false);
      return;
    }
    setOpenId(rid);
    setDetailHtml(null);
    if (row.feedType === 'generated') {
      setDetailLoading(true);
      try {
        const res = await fetch(
          `/api/generated?id=${encodeURIComponent(row.id)}`
        );
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.item && data.item.bodyHtml) {
          setDetailHtml(data.item.bodyHtml);
        }
      } catch (_) {
        /* vacío */
      }
      setDetailLoading(false);
    } else {
      setDetailLoading(false);
    }
  };

  const filterBtns = [
    { id: 'all', label: 'Todo' },
    { id: 'generated', label: 'Generado' },
    { id: 'prospect_email', label: 'Emails' },
    { id: 'seo', label: 'SEO' },
    { id: 'newsletter', label: 'Newsletter' },
    { id: 'pipeline_lead', label: 'Scoring / pipeline' }
  ];

  return (
    <div>
      <div className="module-header">
        <div className="module-tag">DATOS · ACTIVIDAD</div>
        <div className="module-title">Histórico compartido</div>
        <div className="module-desc">
          Todos los emails, newsletters, contenidos SEO guardados en la base de datos,
          más los leads añadidos al pipeline desde el scoring. Al desplegar una fila
          de tipo generado se carga la vista previa HTML completa.
        </div>
      </div>

      <div className="hist-filters">
        {filterBtns.map((b) => (
          <button
            key={b.id}
            type="button"
            className={`hist-filter-btn ${filter === b.id ? 'on' : ''}`}
            onClick={() => setFilter(b.id)}
          >
            {b.label}
          </button>
        ))}
        <button
          type="button"
          className="btn btn-secondary"
          style={{ marginLeft: 'auto' }}
          onClick={load}
          disabled={loading}
        >
          Actualizar
        </button>
      </div>

      {loading && (
        <div className="card">
          <div className="loading">
            <div className="spinner" />
            Cargando actividad…
          </div>
        </div>
      )}
      {!loading && err && (
        <div className="card ls-error-card">
          <div className="card-title ls-error-title">Sin datos o error</div>
          <div className="ls-error-text">{err}</div>
          <p style={{ marginTop: 10, fontSize: 12, color: 'var(--text-muted)' }}>
            Comprueba <code>DATABASE_URL</code> en local o Neon enlazado en Netlify.
          </p>
        </div>
      )}
      {!loading && !err && filtered.length === 0 && (
        <p style={{ color: 'var(--text-muted)', fontSize: 13 }}>
          No hay entradas con este filtro. Genera contenido con la API configurada y
          guarda leads en el pipeline.
        </p>
      )}
      {!loading &&
        filtered.map((row) => {
          const rid = `${row.feedType}-${row.id}`;
          const open = openId === rid;
          const typeLabel =
            row.feedType === 'generated'
              ? row.subtype === 'prospect_email'
                ? 'Email'
                : row.subtype === 'seo'
                  ? 'SEO'
                  : row.subtype === 'newsletter'
                    ? 'Newsletter'
                    : row.subtype
              : 'Scoring';
          return (
            <div key={rid} className="hist-row">
              <div className="hist-row-head" onClick={() => toggle(row)}>
                <div>
                  <div className="hist-type-pill">{typeLabel}</div>
                  <div className="hist-title">{row.title}</div>
                  <div className="hist-sub">{row.subtitle}</div>
                </div>
                <div className="hist-date">{formatHistDate(row.createdAt)}</div>
              </div>
              {open && (
                <div className="hist-body">
                  {row.snippet && (
                    <div className="hist-snippet">{row.snippet}</div>
                  )}
                  {row.feedType === 'generated' &&
                    (detailLoading ? (
                      <p style={{ color: 'var(--text-muted)' }}>
                        Cargando vista previa…
                      </p>
                    ) : (
                      detailHtml && (
                        <div className="hist-preview-box">
                          <iframe
                            title="Vista previa histórico"
                            sandbox
                            srcDoc={wrapPreviewDoc(detailHtml)}
                          />
                        </div>
                      )
                    ))}
                  {row.feedType === 'pipeline_lead' && row.result && (
                    <div>
                      <p style={{ marginBottom: 10 }}>
                        <strong>Score:</strong> {row.result.score} ·{' '}
                        <strong>Tier:</strong> {row.result.tier} (
                        {row.result.tier_label})
                      </p>
                      <div className="ls-approach">
                        <h4>Enfoque recomendado</h4>
                        {row.result.recommended_approach}
                      </div>
                      {(row.result.priority_actions || []).length > 0 && (
                        <div style={{ marginTop: 12 }}>
                          <strong>Acciones</strong>
                          <ul className="crm-enrich-list">
                            {(row.result.priority_actions || []).map((a, i) => (
                              <li key={i}>{a}</li>
                            ))}
                          </ul>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
    </div>
  );
}

// MÓDULO — CRM + enriquecimiento IA
// ══════════════════════════════════════════════════════════════
function ModuleCRM() {
  const [contacts, setContacts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState('');
  const [form, setForm] = useState({
    nombre: '',
    empresa: '',
    email: '',
    telefono: '',
    pais: '',
    web: '',
    notas: ''
  });
  const [editId, setEditId] = useState(null);
  const [saving, setSaving] = useState(false);
  const [expandId, setExpandId] = useState(null);
  const [enrichingId, setEnrichingId] = useState(null);

  const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));

  const load = async () => {
    setLoading(true);
    setErr('');
    try {
      const res = await fetch('/api/crm');
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.error?.message || `Error ${res.status}`);
      }
      setContacts(Array.isArray(data.contacts) ? data.contacts : []);
    } catch (e) {
      setErr(e.message || 'No se pudo cargar el CRM.');
      setContacts([]);
    }
    setLoading(false);
  };

  useEffect(() => {
    load();
  }, []);

  const resetForm = () => {
    setForm({
      nombre: '',
      empresa: '',
      email: '',
      telefono: '',
      pais: '',
      web: '',
      notas: ''
    });
    setEditId(null);
  };

  const save = async () => {
    if (!form.nombre.trim() || !form.empresa.trim()) {
      setErr('Nombre y empresa son obligatorios.');
      return;
    }
    setSaving(true);
    setErr('');
    try {
      const method = editId ? 'PUT' : 'POST';
      const body = editId ? { ...form, id: editId } : { ...form };
      const res = await fetch('/api/crm', {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.error?.message || `Error ${res.status}`);
      }
      if (data.entry) {
        if (editId) {
          setContacts((prev) =>
            prev.map((c) => (c.id === data.entry.id ? data.entry : c))
          );
        } else {
          setContacts((prev) => [data.entry, ...prev]);
          logActivity('crm', 'create', { id: data.entry.id });
        }
        resetForm();
      }
    } catch (e) {
      setErr(e.message);
    }
    setSaving(false);
  };

  const loadEdit = (c) => {
    setEditId(c.id);
    setForm({
      nombre: c.nombre || '',
      empresa: c.empresa || '',
      email: c.email || '',
      telefono: c.telefono || '',
      pais: c.pais || '',
      web: c.web || '',
      notas: c.notas || ''
    });
  };

  const remove = async (id) => {
    if (!window.confirm('¿Eliminar este contacto del CRM?')) return;
    try {
      const res = await fetch(`/api/crm?id=${encodeURIComponent(id)}`, {
        method: 'DELETE'
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.error?.message || `Error ${res.status}`);
      }
      setContacts((prev) => prev.filter((c) => c.id !== id));
      if (editId === id) resetForm();
      logActivity('crm', 'delete', { id });
    } catch (e) {
      setErr(e.message);
    }
  };

  const enrich = async (id) => {
    setEnrichingId(id);
    setErr('');
    try {
      const res = await fetch('/api/crm/enrich', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.error?.message || `Error ${res.status}`);
      }
      if (data.entry) {
        setContacts((prev) =>
          prev.map((c) => (c.id === data.entry.id ? data.entry : c))
        );
        setExpandId(id);
        logActivity('crm', 'enrich', { id });
      }
    } catch (e) {
      setErr(e.message);
    }
    setEnrichingId(null);
  };

  const encClass = (v) => {
    if (v === 'alto') return 'crm-enc-alto';
    if (v === 'bajo') return 'crm-enc-bajo';
    return 'crm-enc-medio';
  };

  const renderEnrichment = (en) => {
    if (!en || typeof en !== 'object') return null;
    return (
      <div className="crm-enrich-box">
        <div style={{ marginBottom: 10 }}>
          <span
            className={`crm-badge-enc ${encClass(en.encaje_pixelcom)}`}
          >
            Encaje Pixelcom: {en.encaje_pixelcom || '—'}
          </span>
        </div>
        <div className="crm-enrich-kv">
          <strong>Resumen</strong>
          {en.resumen_contacto}
        </div>
        <div className="crm-enrich-kv">
          <strong>Hipótesis empresa</strong>
          {en.hipotesis_empresa}
        </div>
        <div className="crm-enrich-kv">
          <strong>Hipótesis rol</strong>
          {en.hipotesis_rol || '—'}
        </div>
        <div className="crm-enrich-kv">
          <strong>Razón de encaje</strong>
          {en.razon_encaje || '—'}
        </div>
        {(en.angulos_comerciales || []).length > 0 && (
          <div className="crm-enrich-kv">
            <strong>Ángulos comerciales</strong>
            <ul className="crm-enrich-list">
              {(en.angulos_comerciales || []).map((x, i) => (
                <li key={i}>{x}</li>
              ))}
            </ul>
          </div>
        )}
        {(en.preguntas_descubrimiento || []).length > 0 && (
          <div className="crm-enrich-kv">
            <strong>Preguntas de descubrimiento</strong>
            <ul className="crm-enrich-list">
              {(en.preguntas_descubrimiento || []).map((x, i) => (
                <li key={i}>{x}</li>
              ))}
            </ul>
          </div>
        )}
        {(en.riesgos_dudas || []).length > 0 && (
          <div className="crm-enrich-kv">
            <strong>Riesgos / dudas</strong>
            <ul className="crm-enrich-list">
              {(en.riesgos_dudas || []).map((x, i) => (
                <li key={i}>{x}</li>
              ))}
            </ul>
          </div>
        )}
        <div className="crm-enrich-kv">
          <strong>Siguiente paso</strong>
          {en.siguiente_paso}
        </div>
        {(en.datos_a_verificar || []).length > 0 && (
          <div className="crm-enrich-kv">
            <strong>Datos a verificar</strong>
            <ul className="crm-enrich-list">
              {(en.datos_a_verificar || []).map((x, i) => (
                <li key={i}>{x}</li>
              ))}
            </ul>
          </div>
        )}
        {en.disclaimer && (
          <p
            style={{
              marginTop: 12,
              fontSize: 11,
              color: 'var(--text-faint)',
              fontStyle: 'italic'
            }}
          >
            {en.disclaimer}
          </p>
        )}
      </div>
    );
  };

  return (
    <div>
      <div className="module-header">
        <div className="module-tag">COMERCIAL · CRM</div>
        <div className="module-title">CRM de clientes</div>
        <div className="module-desc">
          Alta de contactos y enriquecimiento con Claude a partir del nombre, empresa y
          notas. La IA no navega por internet: infiere contexto útil para comercial y debe
          verificarse antes de usarlo como dato factual.
        </div>
      </div>

      <div className="card">
        <div className="card-title">
          {editId ? 'Editar contacto' : 'Nuevo contacto'}
        </div>
        <div className="form-grid">
          <div className="field">
            <label>Nombre *</label>
            <input
              value={form.nombre}
              onChange={(e) => set('nombre', e.target.value)}
              placeholder="Nombre del contacto"
            />
          </div>
          <div className="field">
            <label>Empresa *</label>
            <input
              value={form.empresa}
              onChange={(e) => set('empresa', e.target.value)}
              placeholder="Razón social o marca"
            />
          </div>
          <div className="field">
            <label>Email</label>
            <input
              type="email"
              value={form.email}
              onChange={(e) => set('email', e.target.value)}
            />
          </div>
          <div className="field">
            <label>Teléfono</label>
            <input
              value={form.telefono}
              onChange={(e) => set('telefono', e.target.value)}
            />
          </div>
          <div className="field">
            <label>País</label>
            <input
              value={form.pais}
              onChange={(e) => set('pais', e.target.value)}
              placeholder="Francia, España…"
            />
          </div>
          <div className="field">
            <label>Web</label>
            <input
              value={form.web}
              onChange={(e) => set('web', e.target.value)}
              placeholder="https://…"
            />
          </div>
          <div className="field" style={{ gridColumn: 'span 2' }}>
            <label>Notas (contexto para la IA)</label>
            <textarea
              value={form.notas}
              onChange={(e) => set('notas', e.target.value)}
              placeholder="Sector, feria donde los conociste, producto de interés…"
              style={{ minHeight: 88 }}
            />
          </div>
        </div>
        <div style={{ display: 'flex', gap: 10, marginTop: 8, flexWrap: 'wrap' }}>
          <button
            type="button"
            className="btn btn-primary"
            onClick={save}
            disabled={saving}
          >
            {saving ? 'Guardando…' : editId ? 'Actualizar' : 'Dar de alta'}
          </button>
          {editId && (
            <button type="button" className="btn btn-secondary" onClick={resetForm}>
              Cancelar edición
            </button>
          )}
        </div>
      </div>

      {err && (
        <div className="card ls-error-card" style={{ marginBottom: 16 }}>
          <div className="ls-error-text">{err}</div>
        </div>
      )}

      {loading && (
        <div className="card">
          <div className="loading">
            <div className="spinner" />
            Cargando contactos…
          </div>
        </div>
      )}
      {!loading && (
        <div className="card">
          <div className="card-title">Contactos ({contacts.length})</div>
          {contacts.length === 0 ? (
            <p style={{ fontSize: 13, color: 'var(--text-muted)' }}>
              Aún no hay contactos. Con la base de datos conectada, aparecerán aquí.
            </p>
          ) : (
            <div style={{ overflowX: 'auto' }}>
              <table className="crm-table">
                <thead>
                  <tr>
                    <th>Empresa</th>
                    <th>Contacto</th>
                    <th>País</th>
                    <th>IA</th>
                    <th />
                  </tr>
                </thead>
                <tbody>
                  {contacts.map((c) => (
                    <React.Fragment key={c.id}>
                      <tr>
                        <td>{c.empresa}</td>
                        <td>{c.nombre}</td>
                        <td>{c.pais || '—'}</td>
                        <td>
                          {c.enrichment ? (
                            <span
                              className={`crm-badge-enc ${encClass(
                                c.enrichment.encaje_pixelcom
                              )}`}
                            >
                              {c.enrichment.encaje_pixelcom || 'ok'}
                            </span>
                          ) : (
                            '—'
                          )}
                        </td>
                        <td>
                          <div className="crm-actions">
                            <button
                              type="button"
                              className="ls-link-btn"
                              onClick={() =>
                                setExpandId((x) => (x === c.id ? null : c.id))
                              }
                            >
                              {expandId === c.id ? 'Ocultar' : 'Ver'}
                            </button>
                            <button
                              type="button"
                              className="ls-link-btn"
                              onClick={() => loadEdit(c)}
                            >
                              Editar
                            </button>
                            <button
                              type="button"
                              className="ls-link-btn"
                              onClick={() => enrich(c.id)}
                              disabled={enrichingId === c.id}
                            >
                              {enrichingId === c.id ? 'IA…' : 'Enriquecer IA'}
                            </button>
                            <button
                              type="button"
                              className="ls-link-btn"
                              onClick={() => remove(c.id)}
                              style={{ color: 'var(--warn)' }}
                            >
                              Eliminar
                            </button>
                          </div>
                        </td>
                      </tr>
                      {expandId === c.id && (
                        <tr>
                          <td colSpan={5} style={{ background: 'var(--bg)', verticalAlign: 'top' }}>
                            <div style={{ padding: '8px 0 16px' }}>
                              <div style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 8 }}>
                                <strong>Email:</strong> {c.email || '—'} ·{' '}
                                <strong>Tel:</strong> {c.telefono || '—'} ·{' '}
                                <strong>Web:</strong> {c.web || '—'}
                              </div>
                              {c.notas && (
                                <div style={{ fontSize: 12, marginBottom: 10 }}>
                                  <strong>Notas:</strong> {c.notas}
                                </div>
                              )}
                              {renderEnrichment(c.enrichment)}
                              {!c.enrichment && (
                                <p style={{ fontSize: 12, color: 'var(--text-faint)' }}>
                                  Pulsa «Enriquecer IA» para generar perfil comercial inferido.
                                </p>
                              )}
                            </div>
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  ))}
                </tbody>
              </table>
            </div>
          )}
          <button
            type="button"
            className="btn btn-secondary"
            style={{ marginTop: 14 }}
            onClick={load}
          >
            Refrescar lista
          </button>
        </div>
      )}
    </div>
  );
}
