// MÓDULO 3 — Newsletter segmentada
// ══════════════════════════════════════════════════════════════
function Module3({ apiKey }) {
  const { catalog } = usePixelcomCatalog();
  const [outputLanguage, setOutputLanguage] = useState('frances');
  const [segmentos, setSegmentos] = useState(['timing_fr']);
  const [temas, setTemas] = useState('');
  const [novedad, setNovedad] = useState('');
  const [cta, setCta] = useState('demo');
  const [result, setResult] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [savedGenId, setSavedGenId] = useState(null);

  const allSegmentos = [
    { value: 'timing_fr', label: 'Clientes Pixeltiming — Francia', color: 'teal' },
    { value: 'timing_eu', label: 'Clientes Pixeltiming — Europa', color: 'teal' },
    { value: 'motorsport_eu', label: 'Clientes Pixelmotorsport — Europa', color: 'coral' },
    { value: 'prospects_fr', label: 'Prospectos cualificados — Francia', color: 'amber' },
    { value: 'prospects_en', label: 'Prospectos cualificados — Anglosajón', color: 'amber' },
  ];

  const toggleSeg = (v) => setSegmentos(s => s.includes(v) ? s.filter(x=>x!==v) : [...s,v]);

  const ctas = [
    { value: 'demo', label: 'Solicitar demostración' },
    { value: 'llamada', label: 'Agendar llamada' },
    { value: 'descarga', label: 'Descargar documentación' },
    { value: 'feria', label: 'Visitarnos en feria' },
  ];

  const generate = async () => {
    if (!temas) { setError('Describe los temas de la newsletter.'); return; }
    if (segmentos.length === 0) { setError('Selecciona al menos un segmento.'); return; }
    setLoading(true); setError(''); setResult(''); setSavedGenId(null);

    const segLabels = segmentos.map(s=>allSegmentos.find(a=>a.value===s)?.label).join(', ');
    const ctaLabel = ctas.find(c=>c.value===cta)?.label;
    const idiomaLabel = outputLanguageLabel(outputLanguage);

    const system = `Eres experto en email marketing B2B para Pixelcom Ingeniería, empresa española de tecnología deportiva (Pixeltiming para karting, Pixelmotorsport para circuitos de velocidad). Redactas newsletters profesionales en ${idiomaLabel} que mezclan novedades técnicas, noticias del sector y llamadas a la acción claras. Tono cercano, técnico y orientado a negocio. Nunca uses jerga de marketing genérica.

${catalog.fullText}`;

    const user = `Redacta una newsletter mensual en ${idiomaLabel} para el siguiente segmento: ${segLabels}.

Temas a incluir: ${temas}
${novedad ? `Novedad de producto destacada: ${novedad}` : ''}
Llamada a la acción principal: ${ctaLabel}

Estructura:
1. Asunto del email (2 opciones)
2. Saludo personalizado
3. Introducción (2-3 líneas)
4. Sección 1: novedad o contenido principal
5. Sección 2: noticia del sector o referencia de cliente
6. Sección 3 (opcional): recurso útil o tip técnico
7. Llamada a la acción clara
8. Cierre y firma

Longitud total: 250-350 palabras.

Entrega el resultado ÚNICAMENTE como fragmento HTML (sin markdown, sin bloques de código): usa h1 para el título principal, h2/h3 para secciones, p, ul/ol/li, strong, em. Incluye al inicio un bloque con <strong>Opciones de asunto</strong> y dos <p> con cada asunto. No uses <script>.`;

    try {
      const text = await callClaude(apiKey, system, user);
      setResult(text);
      logActivity('newsletter', 'generate', { segmentos, outputLanguage });
      const entry = await persistGenerated({
        kind: 'newsletter',
        outputLanguage,
        input: { segmentos, temas, novedad, cta },
        bodyHtml: text
      });
      if (entry?.id) setSavedGenId(entry.id);
    } catch(e) { setError(e.message); }
    setLoading(false);
  };

  return (
    <div>
      <div className="module-header">
        <div className="module-tag">CASO DE USO 3 · NEWSLETTER</div>
        <div className="module-title">Newsletter segmentada</div>
        <div className="module-desc">Elige el idioma de salida en el bloque de contenido. Vista previa HTML por segmento.</div>
      </div>

      <div className="stats-row">
        <div className="stat-card">
          <div className="stat-label">Newsletters actuales</div>
          <div className="stat-value">0</div>
          <div className="stat-sub">comunicación reactiva</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Objetivo</div>
          <div className="stat-value">3-5</div>
          <div className="stat-sub">newsletters/mes por segmento</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Tiempo de producción</div>
          <div className="stat-value">45 min</div>
          <div className="stat-sub">briefing + revisión</div>
        </div>
      </div>

      <div className="card">
        <div className="card-title">Segmento de destinatarios</div>
        <div className="pills">
          {allSegmentos.map(s => (
            <div key={s.value} className={`pill ${segmentos.includes(s.value)?'selected':''}`}
              onClick={()=>toggleSeg(s.value)}>
              {s.label}
            </div>
          ))}
        </div>
      </div>

      <div className="card">
        <div className="card-title">Contenido de la newsletter</div>
        <div className="form-grid cols-1">
          <div className="field">
            <label>Temas a incluir este mes *</label>
            <textarea value={temas} onChange={e=>setTemas(e.target.value)}
              placeholder="Actualización del software Pixeltiming v4.2 con nuevas funciones de gestión de grupos, noticia del sector sobre apertura de nuevos kartings en Francia, anuncio de presencia en feria Offenbach en enero..." />
          </div>
          <div className="field">
            <label>Novedad de producto destacada (opcional)</label>
            <input value={novedad} onChange={e=>setNovedad(e.target.value)}
              placeholder="Nueva funcionalidad de control remoto de karts desde app móvil" />
          </div>
        </div>
        <div className="form-grid" style={{marginTop:14}}>
          <div className="field">
            <label>Llamada a la acción principal</label>
            <select value={cta} onChange={e=>setCta(e.target.value)}>
              {ctas.map(c=><option key={c.value} value={c.value}>{c.label}</option>)}
            </select>
          </div>
          <div className="field">
            <label>Idioma de salida</label>
            <select value={outputLanguage} onChange={(e) => setOutputLanguage(e.target.value)}>
              {OUTPUT_LANGS.map((l) => (
                <option key={l.value} value={l.value}>{l.label}</option>
              ))}
            </select>
          </div>
        </div>
      </div>

      <button className="btn btn-primary" onClick={generate} disabled={loading}>
        {loading ? 'Generando...' : 'Generar newsletter'}
      </button>

      <OutputBlock
        result={result}
        loading={loading}
        error={error}
        variant="article"
        savedEntryId={savedGenId}
        onPersisted={(entry) =>
          entry && setResult(generatedEntryToResult(entry, 'article'))
        }
      />
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// MÓDULO 4 — Scoring de leads + pipeline
// ══════════════════════════════════════════════════════════════
function Module4() {
  const { catalog } = usePixelcomCatalog();
  const [view, setView] = useState('evaluar');
  const [form, setForm] = useState({
    nombre: '', empresa: '', pais: 'Francia', tipo: 'nueva_karting', producto: 'pixeltiming_completo',
    canal: 'referencia', urgencia: 'lt3', presupuesto: 'gt50', cliente_existente: 'no', notas: ''
  });
  const [crmContacts, setCrmContacts] = useState([]);
  const [crmPickId, setCrmPickId] = useState('');
  const [senales_negativas, setSenales] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [lastResult, setLastResult] = useState(null);
  const [barWidth, setBarWidth] = useState(0);
  const [leads, setLeads] = useState([]);
  const [expanded, setExpanded] = useState({});
  /** null = cargando API; true = Neon; false = solo localStorage */
  const [pipelineDb, setPipelineDb] = useState(null);

  const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const res = await fetch('/api/leads');
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error('api');
        if (!cancelled && Array.isArray(data.leads)) {
          setLeads(data.leads);
          setPipelineDb(true);
          return;
        }
      } catch {
        /* fallback local */
      }
      if (!cancelled) {
        try {
          const raw = localStorage.getItem(LS_STORAGE_KEY);
          setLeads(raw ? JSON.parse(raw) : []);
        } catch {
          setLeads([]);
        }
        setPipelineDb(false);
      }
    })();
    return () => {
      cancelled = true;
    };
  }, []);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const res = await fetch('/api/crm');
        const data = await res.json().catch(() => ({}));
        if (!res.ok) return;
        if (!cancelled && Array.isArray(data.contacts)) {
          setCrmContacts(data.contacts);
        }
      } catch {
        /* ignore */
      }
    })();
    return () => {
      cancelled = true;
    };
  }, []);

  const applyCrmPick = (id) => {
    const c = crmContacts.find((x) => x.id === id);
    if (!c) return;
    set('nombre', c.nombre || '');
    set('empresa', c.empresa || '');
    if (c.pais) set('pais', c.pais);
    if (c.notas) set('notas', c.notas);
  };

  useEffect(() => {
    if (!lastResult) {
      setBarWidth(0);
      return;
    }
    setBarWidth(0);
    const t = setTimeout(() => setBarWidth(lastResult.score), 70);
    return () => clearTimeout(t);
  }, [lastResult]);

  const SENALES_OPTS = [
    { v: 'solo_precio', label: 'Solo pide precio' },
    { v: 'competidor', label: 'Tiene sistema competidor' },
    { v: 'logistica', label: 'Logística compleja' },
    { v: 'no_decisor', label: 'No es el decisor' },
  ];

  const toggleSenal = (v) => {
    setSenales((s) => (s.includes(v) ? s.filter((x) => x !== v) : [...s, v]));
  };

  const buildLeadPayload = () => ({
    nombre: form.nombre.trim(),
    empresa: form.empresa.trim(),
    pais: form.pais,
    tipo: form.tipo,
    producto: form.producto,
    canal: form.canal,
    urgencia: form.urgencia,
    presupuesto: form.presupuesto,
    cliente_existente: form.cliente_existente,
    notas: form.notas.trim(),
    senales_negativas
  });

  const scoreNow = async () => {
    if (!form.nombre.trim() || !form.empresa.trim()) {
      setError('Nombre y empresa son obligatorios.');
      return;
    }
    setLoading(true);
    setError('');
    setLastResult(null);
    try {
      const r = await fetchLeadScore(buildLeadPayload(), catalog.shortText);
      setLastResult(r);
      logActivity('scoring', 'score', {
        score: r.score,
        tier: r.tier,
        empresa: form.empresa.trim()
      });
    } catch (e) {
      setError(e.message || 'Error al calcular el score.');
    }
    setLoading(false);
  };

  const addToPipeline = async () => {
    if (!lastResult) return;
    if (pipelineDb === true) {
      try {
        const res = await fetch('/api/leads', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nombre: form.nombre.trim(),
            empresa: form.empresa.trim(),
            lead: buildLeadPayload(),
            result: lastResult
          })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error?.message || `Error ${res.status}`);
        if (data.entry) {
          setLeads((prev) => [data.entry, ...prev]);
          logActivity('scoring', 'pipeline_add', {
            id: data.entry.id,
            score: lastResult.score
          });
        }
      } catch (err) {
        setError(err.message || 'No se pudo guardar el lead en la base de datos.');
      }
      return;
    }
    const id =
      typeof crypto !== 'undefined' && crypto.randomUUID
        ? crypto.randomUUID()
        : String(Date.now()) + Math.random().toString(16).slice(2);
    const entry = {
      id,
      createdAt: Date.now(),
      nombre: form.nombre.trim(),
      empresa: form.empresa.trim(),
      lead: buildLeadPayload(),
      result: lastResult
    };
    setLeads((prev) => {
      const next = [entry, ...prev];
      try { localStorage.setItem(LS_STORAGE_KEY, JSON.stringify(next)); } catch (_) {}
      return next;
    });
    logActivity('scoring', 'pipeline_add_local', { id: entry.id, score: lastResult.score });
  };

  const removeLead = async (id, e) => {
    e.stopPropagation();
    if (pipelineDb === true) {
      try {
        const res = await fetch(`/api/leads?id=${encodeURIComponent(id)}`, {
          method: 'DELETE'
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error?.message || `Error ${res.status}`);
        setLeads((prev) => prev.filter((x) => x.id !== id));
        logActivity('scoring', 'pipeline_remove', { id });
      } catch (err) {
        setError(err.message || 'No se pudo eliminar el lead.');
      }
      setExpanded((ex) => {
        const n = { ...ex };
        delete n[id];
        return n;
      });
      return;
    }
    setLeads((prev) => {
      const next = prev.filter((x) => x.id !== id);
      try { localStorage.setItem(LS_STORAGE_KEY, JSON.stringify(next)); } catch (_) {}
      return next;
    });
    setExpanded((ex) => {
      const n = { ...ex };
      delete n[id];
      return n;
    });
    logActivity('scoring', 'pipeline_remove_local', { id });
  };

  const stats = useMemo(() => {
    const n = leads.length;
    const hot = leads.filter((l) => l.result.tier === 'HOT').length;
    const warm = leads.filter((l) => l.result.tier === 'WARM').length;
    const avg = n ? Math.round(leads.reduce((a, l) => a + l.result.score, 0) / n) : 0;
    return { n, hot, warm, avg };
  }, [leads]);

  const grouped = useMemo(() => {
    const today = [];
    const week = [];
    const low = [];
    for (const L of leads) {
      const b = lsBucket(L.result);
      if (b === 'today') today.push(L);
      else if (b === 'week') week.push(L);
      else low.push(L);
    }
    const sortFn = (a, b) => b.result.score - a.result.score;
    today.sort(sortFn);
    week.sort(sortFn);
    low.sort(sortFn);
    return { today, week, low };
  }, [leads]);

  const toggleExpand = (id) => {
    setExpanded((ex) => ({ ...ex, [id]: !ex[id] }));
  };

  const renderLeadCard = (L) => {
    const r = L.result;
    const open = !!expanded[L.id];
    const col = lsTierColor(r.tier);
    return (
      <div key={L.id} className="ls-lead-card">
        <div className="ls-lead-head" onClick={() => toggleExpand(L.id)}>
          <div>
            <div className="ls-lead-title">{L.nombre} · {L.empresa}</div>
            <div className="ls-lead-meta">
              <span className="ls-tier-dot" style={{ background: col }} />
              {r.tier} · {r.tier_label} · seguimiento en {r.follow_up_days} días · {r.estimated_value}
            </div>
          </div>
          <div className="ls-lead-score" style={{ color: col }}>{r.score}</div>
        </div>
        {open && (
          <div className="ls-lead-body">
            <table className="ls-table">
              <thead><tr><th>Criterio</th><th>Puntos</th><th>Motivo</th></tr></thead>
              <tbody>
                {(r.breakdown || []).map((row, i) => (
                  <tr key={i}>
                    <td>{row.category}</td>
                    <td className={row.points < 0 ? 'ls-points-neg' : 'ls-points-pos'}>{row.points > 0 ? '+' : ''}{row.points}</td>
                    <td>{row.reason}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div style={{ marginTop: 14 }}>
              <strong>Acciones prioritarias</strong>
              <ul className="ls-priority-list">
                {(r.priority_actions || []).map((a, i) => (
                  <li key={i}>{a}</li>
                ))}
              </ul>
            </div>
            <div className="ls-approach">
              <h4>Enfoque recomendado</h4>
              {r.recommended_approach}
            </div>
            <div className="ls-actions-row">
              <button type="button" className="ls-link-btn" onClick={(e) => removeLead(L.id, e)}>Eliminar del pipeline</button>
            </div>
          </div>
        )}
      </div>
    );
  };

  return (
    <div>
      <div className="module-header">
        <div className="module-tag">COMERCIAL · SCORING</div>
        <div className="module-title">Scoring de leads</div>
        <div className="module-desc">Motor de puntuación 0–100 con desglose, tier y acciones recomendadas. Los leads guardados se agrupan en el pipeline local (navegador).</div>
      </div>

      <div className="ls-subnav">
        <button type="button" className={view === 'evaluar' ? 'active' : ''} onClick={() => setView('evaluar')}>Evaluar lead</button>
        <button type="button" className={view === 'pipeline' ? 'active' : ''} onClick={() => setView('pipeline')}>Pipeline</button>
      </div>
      <p style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 18, lineHeight: 1.5 }}>
        {pipelineDb === null && 'Comprobando almacenamiento…'}
        {pipelineDb === true && 'Pipeline sincronizado con Neon (PostgreSQL). Los eventos de uso se registran en la tabla app_events.'}
        {pipelineDb === false && 'Sin conexión a la base de datos: el pipeline solo existe en este navegador (localStorage). Configura DATABASE_URL en local o NETLIFY_DATABASE_URL en Netlify.'}
      </p>

      {view === 'pipeline' && (
        <>
          <div className="stats-row">
            <div className="stat-card"><div className="stat-label">Total leads</div><div className="stat-value">{stats.n}</div></div>
            <div className="stat-card"><div className="stat-label">HOT</div><div className="stat-value" style={{ color: '#5DCAA5' }}>{stats.hot}</div></div>
            <div className="stat-card"><div className="stat-label">WARM</div><div className="stat-value" style={{ color: '#FAC775' }}>{stats.warm}</div></div>
            <div className="stat-card"><div className="stat-label">Score medio</div><div className="stat-value">{stats.avg}</div></div>
          </div>
          <div className="ls-pipeline-col">
            <div className="ls-pipeline-title">Actuar hoy</div>
            {grouped.today.length === 0 && <div className="ls-empty-hint">Sin leads en este bloque.</div>}
            {grouped.today.map(renderLeadCard)}
          </div>
          <div className="ls-pipeline-col">
            <div className="ls-pipeline-title">Seguimiento esta semana</div>
            {grouped.week.length === 0 && <div className="ls-empty-hint">Sin leads en este bloque.</div>}
            {grouped.week.map(renderLeadCard)}
          </div>
          <div className="ls-pipeline-col">
            <div className="ls-pipeline-title">Baja prioridad</div>
            {grouped.low.length === 0 && <div className="ls-empty-hint">Sin leads en este bloque.</div>}
            {grouped.low.map(renderLeadCard)}
          </div>
        </>
      )}

      {view === 'evaluar' && (
        <>
          <div className="card">
            <div className="card-title">Datos del lead</div>
            <div className="form-grid">
              <div className="field" style={{ gridColumn: 'span 2' }}>
                <label>Elegir contacto del CRM (opcional)</label>
                <select
                  value={crmPickId}
                  onChange={(e) => {
                    const v = e.target.value;
                    setCrmPickId(v);
                    if (v) applyCrmPick(v);
                  }}
                >
                  <option value="">—</option>
                  {crmContacts.map((c) => (
                    <option key={c.id} value={c.id}>
                      {(c.empresa || '—') + ' · ' + (c.nombre || '—')}
                    </option>
                  ))}
                </select>
              </div>
              <div className="field"><label>Nombre *</label><input value={form.nombre} onChange={(e) => set('nombre', e.target.value)} /></div>
              <div className="field"><label>Empresa *</label><input value={form.empresa} onChange={(e) => set('empresa', e.target.value)} /></div>
              <div className="field">
                <label>País</label>
                <select value={form.pais} onChange={(e) => set('pais', e.target.value)}>
                  <option>Francia</option><option>España</option><option>UK</option><option>USA</option><option>Alemania</option><option>Otros</option>
                </select>
              </div>
              <div className="field">
                <label>Tipo</label>
                <select value={form.tipo} onChange={(e) => set('tipo', e.target.value)}>
                  <option value="nueva_karting">Nueva apertura karting</option>
                  <option value="renovacion">Renovación</option>
                  <option value="circuito">Circuito velocidad</option>
                  <option value="consultor">Consultor</option>
                  <option value="admin">Admin. pública</option>
                </select>
              </div>
              <div className="field">
                <label>Producto</label>
                <select value={form.producto} onChange={(e) => set('producto', e.target.value)}>
                  {catalog.scoringProducts.map((p) => (
                    <option key={p.value} value={p.value}>{p.label}</option>
                  ))}
                </select>
              </div>
              <div className="field">
                <label>Canal</label>
                <select value={form.canal} onChange={(e) => set('canal', e.target.value)}>
                  <option value="referencia">Referencia cliente</option>
                  <option value="feria">Feria sectorial</option>
                  <option value="web">Web orgánica</option>
                  <option value="linkedin">LinkedIn</option>
                  <option value="cold">Cold contact</option>
                </select>
              </div>
              <div className="field">
                <label>Urgencia</label>
                <select value={form.urgencia} onChange={(e) => set('urgencia', e.target.value)}>
                  <option value="lt3">&lt; 3 meses</option>
                  <option value="3_6">3-6 meses</option>
                  <option value="6_12">6-12 meses</option>
                  <option value="sin">Sin definir</option>
                </select>
              </div>
              <div className="field">
                <label>Presupuesto</label>
                <select value={form.presupuesto} onChange={(e) => set('presupuesto', e.target.value)}>
                  <option value="gt50">&gt; 50k€</option>
                  <option value="20_50">20-50k€</option>
                  <option value="10_20">10-20k€</option>
                  <option value="lt10">&lt; 10k€</option>
                  <option value="desc">Desconocido</option>
                </select>
              </div>
              <div className="field">
                <label>Cliente existente</label>
                <select value={form.cliente_existente} onChange={(e) => set('cliente_existente', e.target.value)}>
                  <option value="no">No</option>
                  <option value="activo">Sí activo</option>
                  <option value="inactivo">Sí inactivo</option>
                </select>
              </div>
              <div className="field" style={{ gridColumn: 'span 2' }}>
                <label>Señales negativas</label>
                <div className="pills">

function fmtMoneyEUR(n) {
  const v = Number(n) || 0;
  return v.toLocaleString('es-ES', {
    style: 'currency',
    currency: 'EUR',
    maximumFractionDigits: 0
  });
}

function clamp(n, a, b) {
  return Math.min(b, Math.max(a, n));
}

function buildFakeSeries(days, base, volatility, trendPerDay) {
  const out = [];
  let x = base;
  for (let i = 0; i < days; i++) {
    const noise = (Math.random() - 0.5) * volatility;
    x = Math.max(0, x + noise + trendPerDay);
    out.push(Math.round(x));
  }
  return out;
}

function MiniLineChart({ values, height = 120, color = '#D4141D', onHover }) {
  const w = 520;
  const h = height;
  const pad = 14;
  const vmin = Math.min(...values, 0);
  const vmax = Math.max(...values, 1);
  const sx = (i) =>
    pad + (i * (w - pad * 2)) / Math.max(1, values.length - 1);
  const sy = (v) =>
    pad + ((vmax - v) * (h - pad * 2)) / Math.max(1, vmax - vmin);

  const d = values
    .map((v, i) => `${i === 0 ? 'M' : 'L'} ${sx(i).toFixed(2)} ${sy(v).toFixed(2)}`)
    .join(' ');

  return (
    <svg
      width="100%"
      viewBox={`0 0 ${w} ${h}`}
      style={{ display: 'block' }}
      onMouseMove={(e) => {
        const r = e.currentTarget.getBoundingClientRect();
        const px = clamp(e.clientX - r.left, 0, r.width);
        const t = px / Math.max(1, r.width);
        const idx = clamp(Math.round(t * (values.length - 1)), 0, values.length - 1);
        if (onHover) onHover({ idx, value: values[idx] });
      }}
      onMouseLeave={() => onHover && onHover(null)}
    >
      <path d={d} fill="none" stroke={color} strokeWidth="2.5" />
      <path
        d={`${d} L ${sx(values.length - 1)} ${h - pad} L ${sx(0)} ${h - pad} Z`}
        fill={color}
        opacity="0.08"
      />
    </svg>
  );
}

function MiniBarChart({ values, height = 140, color = '#0F172A', onHover }) {
  const w = 520;
  const h = height;
  const pad = 14;
  const vmax = Math.max(...values, 1);
  const bw = (w - pad * 2) / Math.max(1, values.length);
  return (
    <svg
      width="100%"
      viewBox={`0 0 ${w} ${h}`}
      style={{ display: 'block' }}
      onMouseMove={(e) => {
        const r = e.currentTarget.getBoundingClientRect();
        const px = clamp(e.clientX - r.left, 0, r.width);
        const t = px / Math.max(1, r.width);
        const idx = clamp(Math.floor(t * values.length), 0, values.length - 1);
        if (onHover) onHover({ idx, value: values[idx] });
      }}
      onMouseLeave={() => onHover && onHover(null)}
    >
      {values.map((v, i) => {
        const x = pad + i * bw + bw * 0.15;
        const barW = bw * 0.7;
        const barH = ((Number(v) || 0) * (h - pad * 2)) / vmax;
        const y = h - pad - barH;
        return (
          <rect
            key={i}
            x={x}
            y={y}
            width={barW}
            height={barH}
            rx="3"
            fill={color}
            opacity="0.85"
          />
        );
      })}
    </svg>
  );
}

function Sparkline({ values, color = 'var(--accent)' }) {
  return (
    <div style={{ marginTop: 10 }}>
      <MiniLineChart values={values} height={66} color={color} onHover={null} />
    </div>
  );
}

function ModuleBI() {
  const [range, setRange] = useState('30d');
  const [metric, setMetric] = useState('mrr');
  const [hover, setHover] = useState(null);
  const [hoverBars, setHoverBars] = useState(null);

  const days = range === '7d' ? 7 : range === '90d' ? 90 : 30;
  const seedKey = `${range}:${metric}`;

  const series = useMemo(() => {
    // reproducibilidad básica por seedKey (sin librerías)
    let s = 0;
    for (let i = 0; i < seedKey.length; i++) s = (s * 31 + seedKey.charCodeAt(i)) >>> 0;
    const oldRand = Math.random;
    Math.random = () => {
      // LCG
      s = (1664525 * s + 1013904223) >>> 0;
      return (s & 0xffffffff) / 0x100000000;
    };
    const v =
      metric === 'mrr'
        ? buildFakeSeries(days, 82000, 4200, 140)
        : metric === 'pipeline'
          ? buildFakeSeries(days, 260000, 16000, 320)
          : metric === 'lead_score'
            ? buildFakeSeries(days, 55, 9, 0.03)
            : buildFakeSeries(days, 220, 22, 0.6); // activity
    Math.random = oldRand;
    return v;
  }, [days, metric, seedKey]);

  const last = series[series.length - 1] || 0;
  const first = series[0] || 0;
  const delta = last - first;
  const deltaPct = first ? Math.round((delta / first) * 100) : 0;

  const kpis = useMemo(() => {
    const mrr = metric === 'mrr' ? last : 83500;
    const pipe = metric === 'pipeline' ? last : 278000;
    const win = 0.18 + (deltaPct / 1000);
    const cac = 920;
    return {
      mrr,
      pipeline: pipe,
      winRate: clamp(win, 0.05, 0.35),
      cac
    };
  }, [metric, last, deltaPct]);

  const headline =
    metric === 'mrr'
      ? `MRR (estimado): ${fmtMoneyEUR(last)}`
      : metric === 'pipeline'
        ? `Pipeline (estimado): ${fmtMoneyEUR(last)}`
        : metric === 'lead_score'
          ? `Score medio: ${Math.round(last)}/100`
          : `Actividad: ${Math.round(last)} eventos`;

  const spark = useMemo(() => {
    const seed = (k) => {
      let s = 0;
      for (let i = 0; i < k.length; i++) s = (s * 31 + k.charCodeAt(i)) >>> 0;
      const old = Math.random;
      Math.random = () => {
        s = (1664525 * s + 1013904223) >>> 0;
        return (s & 0xffffffff) / 0x100000000;
      };
      const v = buildFakeSeries(18, 10 + (s % 30), 6 + (s % 10), 0.12);
      Math.random = old;
      return v;
    };
    return {
      mrr: seed(`mrr:${range}`),
      pipeline: seed(`pipe:${range}`),
      win: seed(`win:${range}`),
      act: seed(`act:${range}`)
    };
  }, [range]);

  const sources = useMemo(() => {
    const labels = ['Web', 'Feria', 'Referencia', 'LinkedIn', 'Partners'];
    const seedKey2 = `${range}:sources`;
    let s = 0;
    for (let i = 0; i < seedKey2.length; i++) s = (s * 31 + seedKey2.charCodeAt(i)) >>> 0;
    const oldRand = Math.random;
    Math.random = () => {
      s = (1664525 * s + 1013904223) >>> 0;
      return (s & 0xffffffff) / 0x100000000;
    };
    const vals = labels.map(() => Math.max(3, Math.round(10 + Math.random() * 40)));
    Math.random = oldRand;
    return { labels, vals };
  }, [range]);

  const funnel = useMemo(() => {
    const leads = 120 + (days === 7 ? 0 : days === 30 ? 40 : 90);
    const mql = Math.round(leads * 0.55);
    const sql = Math.round(mql * 0.45);
    const quote = Math.round(sql * 0.55);
    const won = Math.round(quote * 0.22);
    return [
      { k: 'Leads', v: leads },
      { k: 'MQL', v: mql },
      { k: 'SQL', v: sql },
      { k: 'Presupuesto', v: quote },
      { k: 'Ganadas', v: won }
    ];
  }, [days]);

  return (
    <div>
      <div className="module-header">
        <div className="module-tag">DIRECCIÓN · BI</div>
        <div className="module-title">Dashboard de KPIs Directivos (BI)</div>
        <div className="module-desc">
          Panel de KPIs y tendencias. Los gráficos son interactivos (hover) y el rango/variable cambia la serie.
        </div>
      </div>

      <div className="card">
        <div className="card-title">Controles</div>
        <div className="form-grid">
          <div className="field">
            <label>Rango</label>
            <select value={range} onChange={(e) => setRange(e.target.value)}>
              <option value="7d">7 días</option>
              <option value="30d">30 días</option>
              <option value="90d">90 días</option>
            </select>
          </div>
          <div className="field">
            <label>Métrica</label>
            <select value={metric} onChange={(e) => setMetric(e.target.value)}>
              <option value="mrr">MRR</option>
              <option value="pipeline">Pipeline</option>
              <option value="lead_score">Score medio leads</option>
              <option value="activity">Actividad</option>
            </select>
          </div>
          <div className="field" style={{ gridColumn: 'span 2' }}>
            <label>Resumen</label>
            <div style={{ fontSize: 13, color: 'var(--text-muted)' }}>
              {headline} · Variación {delta >= 0 ? '+' : ''}{deltaPct}% ({delta >= 0 ? '+' : ''}{delta.toLocaleString('es-ES')})
              {hover && (
                <>
                  {' '}· Día {hover.idx + 1}: <strong style={{ color: 'var(--text)' }}>{Math.round(hover.value).toLocaleString('es-ES')}</strong>
                </>
              )}
            </div>
          </div>
        </div>
      </div>

      <div className="stats-row" style={{ marginTop: 16 }}>
        <div className="stat-card">
          <div className="stat-label">MRR</div>
          <div className="stat-value">{fmtMoneyEUR(kpis.mrr)}</div>
          <div className="stat-sub">recurrencia mensual</div>
          <Sparkline values={spark.mrr} />
        </div>
        <div className="stat-card">
          <div className="stat-label">Pipeline</div>
          <div className="stat-value">{fmtMoneyEUR(kpis.pipeline)}</div>
          <div className="stat-sub">oportunidades abiertas</div>
          <Sparkline values={spark.pipeline} color="#0F172A" />
        </div>
        <div className="stat-card">
          <div className="stat-label">Win rate</div>
          <div className="stat-value">{Math.round(kpis.winRate * 100)}%</div>
          <div className="stat-sub">últimos {days} días</div>
          <Sparkline values={spark.win} color="#10B981" />
        </div>
        <div className="stat-card">
          <div className="stat-label">CAC</div>
          <div className="stat-value">{fmtMoneyEUR(kpis.cac)}</div>
          <div className="stat-sub">por lead convertido</div>
          <Sparkline values={spark.act} color="#6366F1" />
        </div>
      </div>

      <div className="card" style={{ marginTop: 16 }}>
        <div className="card-title">Tendencia</div>
        <MiniLineChart
          values={series}
          color="var(--accent)"
          onHover={setHover}
        />
      </div>

      <div className="card" style={{ marginTop: 16 }}>
        <div className="card-title">Leads por origen</div>
        <div style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 10 }}>
          {hoverBars
            ? `${sources.labels[hoverBars.idx]}: ${Math.round(hoverBars.value)} leads`
            : 'Pasa el ratón por las barras para ver detalle.'}
        </div>
        <MiniBarChart
          values={sources.vals}
          color="var(--text)"
          onHover={setHoverBars}
        />
        <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', marginTop: 10 }}>
          {sources.labels.map((l, i) => (
            <span key={l} className="pill" style={{ cursor: 'default' }}>
              {l}: <strong style={{ color: 'var(--text)' }}>{sources.vals[i]}</strong>
            </span>
          ))}
        </div>
      </div>

      <div className="card" style={{ marginTop: 16 }}>
        <div className="card-title">Funnel comercial</div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: 10, marginTop: 8 }}>
          {funnel.map((x, i) => {
            const base = funnel[0].v || 1;
            const pct = Math.round((x.v / base) * 100);
            return (
              <div key={x.k} style={{ display: 'grid', gridTemplateColumns: '120px 1fr 70px', gap: 12, alignItems: 'center' }}>
                <div style={{ fontSize: 12, color: 'var(--text-muted)', fontWeight: 600 }}>{x.k}</div>
                <div style={{ height: 10, borderRadius: 999, background: 'var(--surface2)', overflow: 'hidden', border: '1px solid var(--border)' }}>
                  <div style={{ width: `${pct}%`, height: '100%', background: 'var(--accent)' }} />
                </div>
                <div style={{ fontSize: 12, textAlign: 'right' }}>
                  <strong>{x.v}</strong> <span style={{ color: 'var(--text-faint)' }}>({pct}%)</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

const LS_Q2C = 'pixelcom_q2c_v1';

function loadQ2C() {
  try {
    const raw = localStorage.getItem(LS_Q2C);
    return raw ? JSON.parse(raw) : [];
  } catch {
    return [];
  }
}

function saveQ2C(rows) {
  try {
    localStorage.setItem(LS_Q2C, JSON.stringify(rows));
  } catch {
    /* ignore */
  }
}

function nextStage(stage) {
  const order = ['lead', 'quote', 'order', 'invoice', 'paid'];
  const i = order.indexOf(stage);
  return order[Math.min(order.length - 1, i + 1)] || 'lead';
}

function stageLabel(stage) {
  if (stage === 'lead') return 'Lead';
  if (stage === 'quote') return 'Presupuesto';
  if (stage === 'order') return 'Pedido';
  if (stage === 'invoice') return 'Factura';
  return 'Cobrado';
}

function ModuleQuoteToCash() {
  const { catalog } = usePixelcomCatalog();
  const [crmContacts, setCrmContacts] = useState([]);
  const [crmId, setCrmId] = useState('');
  const [rows, setRows] = useState(() => loadQ2C());
  const [quoteRowId, setQuoteRowId] = useState(null);
  const [quoteHtml, setQuoteHtml] = useState('');
  const [lastMovedId, setLastMovedId] = useState(null);
  const quoteFrameRef = React.useRef(null);
  const [form, setForm] = useState({
    empresa: '',
    contacto: '',
    pais: 'Francia',
    producto: catalog.commercialProducts?.[0]?.value || 'pixeltiming',
    importe: 45000,
    descuento: 0
  });

  const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));

  useEffect(() => {
    saveQ2C(rows);
  }, [rows]);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const res = await fetch('/api/crm');
        const data = await res.json().catch(() => ({}));
        if (!res.ok) return;
        if (!cancelled && Array.isArray(data.contacts)) setCrmContacts(data.contacts);
      } catch {
        /* ignore */
      }
    })();
    return () => {
      cancelled = true;
    };
  }, []);

  useEffect(() => {
    // Mantener producto por defecto si cambia el catálogo
    if (!catalog?.commercialProducts?.some((p) => p.value === form.producto)) {
      set('producto', catalog.commercialProducts?.[0]?.value || 'pixeltiming');
    }
  }, [catalog]);

  const applyCrm = (id) => {
    const c = crmContacts.find((x) => x.id === id);
    if (!c) return;
    set('empresa', c.empresa || '');
    set('contacto', c.nombre || '');
    if (c.pais) set('pais', c.pais);
  };

  const create = () => {
    if (!String(form.empresa || '').trim()) return;
    const id =
      typeof crypto !== 'undefined' && crypto.randomUUID
        ? crypto.randomUUID()
        : String(Date.now()) + Math.random().toString(16).slice(2);
    const now = Date.now();
    const base = Number(form.importe) || 0;
    const disc = clamp(Number(form.descuento) || 0, 0, 60);
    const neto = Math.round(base * (1 - disc / 100));
    const entry = {
      id,
      createdAt: now,
      updatedAt: now,
      stage: 'lead',
      empresa: String(form.empresa || '').trim(),
      contacto: String(form.contacto || '').trim(),
      pais: form.pais,
      producto: form.producto,
      importe_base: base,
      descuento_pct: disc,
      importe_neto: neto,
      ref: `Q-${String(now).slice(-6)}`
    };
    setRows((prev) => [entry, ...prev]);
    logActivity('q2c', 'create', { id: entry.id, stage: entry.stage });
  };

  const advance = (id) => {
    setLastMovedId(id);
    setTimeout(() => setLastMovedId(null), 1300);
    setRows((prev) =>
      prev.map((r) => {
        if (r.id !== id) return r;
        const st = nextStage(r.stage);
        const next = { ...r, stage: st, updatedAt: Date.now() };
        logActivity('q2c', 'advance', { id, stage: st });
        return next;
      })
    );
  };

  const remove = (id) => {
    if (!window.confirm('¿Eliminar esta operación del flujo Quote-to-Cash?')) return;
    setRows((prev) => prev.filter((r) => r.id !== id));
    logActivity('q2c', 'delete', { id });
  };

  const stages = ['lead', 'quote', 'order', 'invoice', 'paid'];
  const rowsByStage = useMemo(() => {
    const map = { lead: [], quote: [], order: [], invoice: [], paid: [] };
    for (const r of rows) {
      const k = map[r.stage] ? r.stage : 'lead';
      map[k].push(r);
    }
    // más recientes arriba
    for (const k of stages) {
      map[k].sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
    }
    return map;
  }, [rows]);

  const logoUrl =
    'https://pixelcom.es/wp-content/uploads/2023/07/Logos-Pixelcom-black-red.png.webp';

  const buildQuoteMarkup = (r) => {
    const today = new Date();
    const dateStr = today.toLocaleDateString('es-ES', { dateStyle: 'long' });
    const productoLabel = productLineLabel(catalog.commercialProducts, r.producto);
    const neto = fmtMoneyEUR(r.importe_neto);
    const base = fmtMoneyEUR(r.importe_base);
    const disc = Number(r.descuento_pct) || 0;

    return `<div class="q2c-quote-root">
  <style>
    *{box-sizing:border-box}
    .q2c-quote-root{font-family:Roboto,Arial,sans-serif;color:#0F172A;margin:0;background:#fff}
    .page{padding:36px 40px}
    .top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start}
    .logo{height:42px;object-fit:contain}
    .doc-title{font-size:20px;font-weight:700;margin:0}
    .muted{color:#475569;font-size:12px;line-height:1.5}
    .pill{display:inline-block;background:#F1F5F9;border:1px solid #E2E8F0;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;color:#475569}
    .box{margin-top:18px;border:1px solid #E2E8F0;border-radius:12px;padding:14px 16px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .k{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:#94A3B8;font-weight:700}
    .v{font-size:13px;color:#0F172A}
    table{width:100%;border-collapse:collapse;margin-top:14px}
    th,td{padding:10px 8px;border-bottom:1px solid #E2E8F0;text-align:left;font-size:12px;vertical-align:top}
    th{color:#475569;text-transform:uppercase;font-size:10px;letter-spacing:.06em}
    .right{text-align:right}
    .total{font-size:16px;font-weight:800}
    .foot{margin-top:18px;color:#64748B;font-size:11px;line-height:1.5}
    .accent{color:#D4141D}
  </style>
  <div class="page">
    <div class="top">
      <div>
        <h1 class="doc-title">Presupuesto <span class="accent">${r.ref}</span></h1>
        <div class="muted">${dateStr}</div>
        <div style="margin-top:10px"><span class="pill">Quote-to-Cash</span></div>
      </div>
      <div style="text-align:right">
        <img class="logo" src="${logoUrl}" alt="Pixelcom" />
        <div class="muted" style="margin-top:6px">
          Pixelcom Ingeniería · www.pixelcom.es<br/>
          Modelo All-in-One: hardware + software + soporte
        </div>
      </div>
    </div>

    <div class="box">
      <div class="grid">
        <div>
          <div class="k">Cliente</div>
          <div class="v"><strong>${escapeHtml(r.empresa || '')}</strong></div>
          <div class="muted">${escapeHtml(r.contacto || '')}</div>
          <div class="muted">${escapeHtml(r.pais || '')}</div>
        </div>
        <div>
          <div class="k">Resumen</div>
          <div class="v">${escapeHtml(productoLabel || '')}</div>
          <div class="muted">Importe base: ${base}${disc ? ` · Descuento: ${disc}%` : ''}</div>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>Concepto</th>
            <th>Detalle</th>
            <th class="right">Importe</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><strong>${escapeHtml(productoLabel || '')}</strong></td>
            <td>Propuesta comercial (demo) basada en el catálogo Pixelcom. Ajustar alcance final tras llamada de descubrimiento.</td>
            <td class="right">${base}</td>
          </tr>
          ${disc ? `<tr>
            <td>Descuento</td>
            <td>${disc}% aplicado</td>
            <td class="right">-${fmtMoneyEUR((Number(r.importe_base)||0) - (Number(r.importe_neto)||0))}</td>
          </tr>` : ''}
          <tr>
            <td colspan="2" class="right total">Total</td>
            <td class="right total">${neto}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="foot">
      <strong>Notas:</strong> Condiciones comerciales e impuestos no incluidos.
    </div>
  </div>
</div>`;
  };

  const buildQuoteDoc = (r) => `<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Presupuesto ${r.ref}</title>
</head>
<body>${buildQuoteMarkup(r)}</body>
</html>`;

  const openQuote = (r) => {
    setQuoteRowId(r.id);
    setQuoteHtml(buildQuoteDoc(r));
  };

  const downloadQuotePdf = async (r) => {
    if (typeof window.html2pdf !== 'function') {
      alert('No se pudo cargar html2pdf. Revisa conexión o bloqueadores.');
      return;
    }
    const wrapper = document.createElement('div');
    wrapper.style.position = 'fixed';
    wrapper.style.left = '0';
    wrapper.style.top = '0';
    wrapper.style.opacity = '1';
    wrapper.style.pointerEvents = 'none';
    wrapper.style.zIndex = '-1';
    wrapper.style.width = '794px'; // ~A4 px a 96dpi
    wrapper.style.transform = 'translateX(-2000px)';
    wrapper.innerHTML = buildQuoteMarkup(r);
    document.body.appendChild(wrapper);

    const page = wrapper.querySelector('.q2c-quote-root') || wrapper;
    const filename = `Presupuesto_${r.ref || 'Pixelcom'}.pdf`;
    try {
      // Espera a que carguen imágenes (logo) antes de renderizar canvas.
      const imgs = Array.from(page.querySelectorAll('img'));
      await Promise.all(
        imgs.map(
          (img) =>
            img.complete
              ? Promise.resolve()
              : new Promise((resolve) => {
                  img.onload = resolve;
                  img.onerror = resolve;
                })
        )
      );

      await window.html2pdf()
        .set({
          margin: 10,
          filename,
          image: { type: 'jpeg', quality: 0.96 },
          html2canvas: {
            scale: 2,
            useCORS: true,
            backgroundColor: '#ffffff',
            imageTimeout: 15000
          },
          jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        })
        .from(page)
        .save();
      logActivity('q2c', 'quote_pdf', { id: r.id });
    } catch (e) {
      alert(e?.message || 'Error al generar el PDF.');
    } finally {
      wrapper.remove();
    }
  };

  return (
    <div>
      <div className="module-header">
        <div className="module-tag">OPERACIONES · AUTOMATIZACIÓN</div>
        <div className="module-title">Automatización del flujo Quote-to-Cash</div>
        <div className="module-desc">
          Flujo para pasar de oportunidad a cobro: lead → presupuesto → pedido → factura → cobrado.
        </div>
      </div>

      <div className="card">
        <div className="card-title">Crear operación</div>
        <div className="form-grid">
          <div className="field" style={{ gridColumn: 'span 2' }}>
            <label>Elegir contacto del CRM (opcional)</label>
            <select
              value={crmId}
              onChange={(e) => {
                const v = e.target.value;
                setCrmId(v);
                if (v) applyCrm(v);
              }}
            >
              <option value="">—</option>
              {crmContacts.map((c) => (
                <option key={c.id} value={c.id}>
                  {(c.empresa || '—') + ' · ' + (c.nombre || '—')}
                </option>
              ))}
            </select>
          </div>
          <div className="field">
            <label>Empresa *</label>
            <input value={form.empresa} onChange={(e) => set('empresa', e.target.value)} />
          </div>
          <div className="field">
            <label>Contacto</label>
            <input value={form.contacto} onChange={(e) => set('contacto', e.target.value)} />
          </div>
          <div className="field">
            <label>País</label>
            <input value={form.pais} onChange={(e) => set('pais', e.target.value)} placeholder="Francia, España…" />
          </div>
          <div className="field">
            <label>Producto / línea</label>
            <select value={form.producto} onChange={(e) => set('producto', e.target.value)}>
              {catalog.commercialProducts.map((p) => (
                <option key={p.value} value={p.value}>{p.label}</option>
              ))}
            </select>
          </div>
          <div className="field">
            <label>Importe base (€)</label>
            <input
              type="number"
              value={form.importe}
              onChange={(e) => set('importe', e.target.value)}
              min="0"
            />
          </div>
          <div className="field">
            <label>Descuento (%)</label>
            <input
              type="number"
              value={form.descuento}
              onChange={(e) => set('descuento', e.target.value)}
              min="0"
              max="60"
            />
          </div>
        </div>
        <button type="button" className="btn btn-primary" style={{ marginTop: 12 }} onClick={create}>
          Añadir al flujo
        </button>
      </div>

      <div className="card" style={{ marginTop: 16 }}>
        <div className="card-title">Operaciones ({rows.length})</div>
        {rows.length === 0 ? (
          <p style={{ fontSize: 13, color: 'var(--text-muted)' }}>
            Crea una operación para ver el flujo.
          </p>
        ) : (
          <div style={{ overflowX: 'auto' }}>
            <table className="crm-table">
              <thead>
                <tr>
                  <th>Ref</th>
                  <th>Empresa</th>
                  <th>Producto</th>
                  <th>Importe</th>
                  <th>Estado</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody>
                {rows.map((r) => (
                  <tr key={r.id}>
                    <td>{r.ref}</td>
                    <td>{r.empresa}</td>
                    <td>{productLineLabel(catalog.commercialProducts, r.producto)}</td>
                    <td>{fmtMoneyEUR(r.importe_neto)}</td>
                    <td>{stageLabel(r.stage)}</td>
                    <td>
                      <div className="crm-actions">
                        <button type="button" className="crm-action-btn" onClick={() => openQuote(r)}>
                          Ver presupuesto
                        </button>
                        <button type="button" className="crm-action-btn" onClick={() => downloadQuotePdf(r)}>
                          Descargar PDF
                        </button>
                        {r.stage !== 'paid' && (
                          <button type="button" className="crm-action-btn" onClick={() => advance(r.id)}>
                            Avanzar
                          </button>
                        )}
                        <button type="button" className="crm-action-btn crm-action-danger" onClick={() => remove(r.id)}>
                          Eliminar
                        </button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>

      <div className="card" style={{ marginTop: 16 }}>
        <div className="card-title">Vista de flujo (Kanban)</div>
        <p style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 10, lineHeight: 1.5 }}>
          Representación visual del avance. Al pulsar <strong>Avanzar</strong>, la tarjeta cambia de columna.
        </p>
        <div className="q2c-board">
          {stages.map((st) => (
            <div key={st} className="q2c-col">
              <div className="q2c-col-head">
                <div className="q2c-col-title">{stageLabel(st)}</div>
                <div className="q2c-col-count">{rowsByStage[st].length}</div>
              </div>
              {rowsByStage[st].length === 0 ? (
                <div style={{ fontSize: 12, color: 'var(--text-faint)', padding: '10px 2px' }}>
                  —
                </div>
              ) : (
                rowsByStage[st].map((r) => (
                  <div
                    key={r.id}
                    className={`q2c-card ${lastMovedId === r.id ? 'moved' : ''}`}
                  >
                    <div className="q2c-card-title">{r.empresa}</div>
                    <div className="q2c-card-meta">
                      <span className="pill">{r.ref}</span>
                      <span>{fmtMoneyEUR(r.importe_neto)}</span>
                    </div>
                    <div className="crm-actions" style={{ marginTop: 10 }}>
                      <button type="button" className="crm-action-btn" onClick={() => openQuote(r)}>
                        Presupuesto
                      </button>
                      <button type="button" className="crm-action-btn" onClick={() => downloadQuotePdf(r)}>
                        PDF
                      </button>
                      {r.stage !== 'paid' && (
                        <button type="button" className="crm-action-btn" onClick={() => advance(r.id)}>
                          Avanzar
                        </button>
                      )}
                    </div>
                  </div>
                ))
              )}
            </div>
          ))}
        </div>
      </div>

      {quoteRowId && (
        <div
          className="crm-modal-overlay"
          onClick={(e) => {
            if (e.target === e.currentTarget) {
              setQuoteRowId(null);
              setQuoteHtml('');
            }
          }}
        >
          <div
            className="crm-modal-panel"
            role="dialog"
            aria-modal="true"
            aria-labelledby="q2c-quote-title"
            onClick={(e) => e.stopPropagation()}
            style={{ maxWidth: 960 }}
          >
            <div className="crm-modal-head">
              <div>
                <div
                  style={{
                    fontSize: 11,
                    color: 'var(--text-faint)',
                    textTransform: 'uppercase',
                    letterSpacing: '0.04em'
                  }}
                >
                  Quote-to-Cash
                </div>
                <h2
                  id="q2c-quote-title"
                  style={{
                    fontSize: 18,
                    fontWeight: 600,
                    margin: '4px 0 2px',
                    lineHeight: 1.25
                  }}
                >
                  Presupuesto (vista previa)
                </h2>
                <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>
                  Puedes imprimirlo desde aquí (o “Guardar como PDF” en el diálogo de impresión).
                </div>
              </div>
              <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
                <button
                  type="button"
                  className="crm-action-btn"
                  onClick={() => {
                    const w = quoteFrameRef.current?.contentWindow;
                    if (!w) return;
                    w.focus();
                    w.print();
                    logActivity('q2c', 'quote_print', { id: quoteRowId });
                  }}
                >
                  Imprimir
                </button>
              <button
                type="button"
                className="crm-modal-close"
                onClick={() => {
                  setQuoteRowId(null);
                  setQuoteHtml('');
                }}
                aria-label="Cerrar ventana"
              >
                ×
              </button>
              </div>
            </div>
            <div className="crm-modal-body">
              <div
                style={{
                  border: '1px solid var(--border)',
                  borderRadius: 12,
                  overflow: 'hidden',
                  background: '#fff'
                }}
              >
                <iframe
                  title="Vista previa presupuesto"
                  sandbox=""
                  style={{ width: '100%', minHeight: 700, border: 'none' }}
                  srcDoc={quoteHtml}
                  ref={quoteFrameRef}
                />
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// MÓDULO — Catálogo Pixelcom (textos IA + opciones de selectores)
// ══════════════════════════════════════════════════════════════
function ModuleCatalog() {
  const { saveCatalog, resetCatalog } = usePixelcomCatalog();
  const [draft, setDraft] = useState(() => loadPixelcomCatalogFromStorage());
  const [savedMsg, setSavedMsg] = useState('');

  const updateCommercial = (i, field, v) => {
    setDraft((d) => {
      const list = [...d.commercialProducts];
      list[i] = { ...list[i], [field]: v };
      return { ...d, commercialProducts: list };
    });
  };
  const updateScoring = (i, field, v) => {
    setDraft((d) => {
      const list = [...d.scoringProducts];
      list[i] = { ...list[i], [field]: v };
      return { ...d, scoringProducts: list };
    });
  };

  const save = () => {
    const m = mergePixelcomCatalog(draft);
    saveCatalog(m);
    setDraft(loadPixelcomCatalogFromStorage());
    setSavedMsg('Catálogo guardado en este navegador.');
    setTimeout(() => setSavedMsg(''), 4000);
    logActivity('catalog', 'save', {});
  };

  const restoreDefaults = () => {
    if (!window.confirm('¿Restaurar textos y listas por defecto? Se perderá la personalización guardada en este navegador.')) return;
    resetCatalog();
    setDraft(getDefaultPixelcomCatalog());
    setSavedMsg('Valores por defecto cargados.');
    setTimeout(() => setSavedMsg(''), 4000);
    logActivity('catalog', 'reset', {});
  };

  return (
    <div>
      <div className="module-header">
        <div className="module-tag">DATOS · CATÁLOGO</div>
        <div className="module-title">Catálogo de productos Pixelcom</div>
        <div className="module-desc">
          Define el <strong>texto de referencia</strong> que recibe la IA en email, contenidos SEO, newsletter,
          enriquecimiento CRM, próximo mail y scoring de leads, y las <strong>opciones de los desplegables</strong>{' '}
          (producto de interés, línea SEO, producto del lead). Los cambios se guardan en{' '}
          <code style={{ fontSize: 11 }}>localStorage</code> de este navegador; el servidor usa lo que envía el Hub
          en cada petición (CRM / scoring).
        </div>
      </div>

      <div className="card">
        <div className="card-title">Texto largo (referencia detallada)</div>
        <p style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 10, lineHeight: 1.55 }}>
          Se inyecta en prompts de generación de contenido y en el enriquecimiento CRM (campo{' '}
          <code style={{ fontSize: 11 }}>catalogFull</code>).
        </p>
        <div className="field">
          <textarea
            value={draft.fullText}
            onChange={(e) => setDraft((d) => ({ ...d, fullText: e.target.value }))}
            style={{ minHeight: 280, fontFamily: 'inherit', fontSize: 13 }}
          />
        </div>
      </div>

      <div className="card" style={{ marginTop: 16 }}>
        <div className="card-title">Texto corto (resumen para scoring y mails CRM)</div>
        <p style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 10, lineHeight: 1.55 }}>
          Versión compacta para el motor de scoring y el próximo mail al cliente (
          <code style={{ fontSize: 11 }}>catalogShort</code>).
        </p>
        <div className="field">
          <textarea
            value={draft.shortText}
            onChange={(e) => setDraft((d) => ({ ...d, shortText: e.target.value }))}
            style={{ minHeight: 120, fontFamily: 'inherit', fontSize: 13 }}
          />
        </div>
      </div>

      <div className="card" style={{ marginTop: 16 }}>
        <div className="card-title">Productos / líneas — selectores comerciales</div>
        <p style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 12 }}>
          Email prospecto (producto de interés) y contenidos SEO (línea de producto). El <em>valor interno</em> no debe
          tener espacios (se usa en JSON guardado).
        </p>
        {draft.commercialProducts.map((row, i) => (
          <div className="form-grid" key={`c-${i}`} style={{ marginBottom: 10, alignItems: 'end' }}>
            <div className="field">
              <label>Valor interno</label>
              <input
                value={row.value}
                onChange={(e) => updateCommercial(i, 'value', e.target.value)}
                placeholder="pixeltiming"
              />
            </div>
            <div className="field">
              <label>Etiqueta visible</label>
              <input
                value={row.label}
                onChange={(e) => updateCommercial(i, 'label', e.target.value)}
                placeholder="Pixeltiming — …"
              />
            </div>
            <div className="field" style={{ maxWidth: 120 }}>
              <label>&nbsp;</label>
              <button
                type="button"
                className="btn btn-secondary"
                style={{ fontSize: 12 }}
                onClick={() =>
                  setDraft((d) => ({
                    ...d,
                    commercialProducts: d.commercialProducts.filter((_, j) => j !== i)
                  }))
                }
              >
                Quitar
              </button>
            </div>
          </div>
        ))}
        <button
          type="button"
          className="btn btn-secondary"
          style={{ marginTop: 8 }}
          onClick={() =>
            setDraft((d) => ({
              ...d,
              commercialProducts: [
                ...d.commercialProducts,
                { value: `linea_${Date.now()}`, label: 'Nueva línea' }
              ]
            }))
          }
        >
          Añadir opción
        </button>
      </div>

      <div className="card" style={{ marginTop: 16 }}>
        <div className="card-title">Productos — scoring de leads</div>
        <p style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 12 }}>
          Opciones del campo «Producto» en el formulario de evaluación de leads (valores coherentes con el prompt de puntuación).
        </p>
        {draft.scoringProducts.map((row, i) => (
          <div className="form-grid" key={`s-${i}`} style={{ marginBottom: 10, alignItems: 'end' }}>
            <div className="field">
              <label>Valor interno</label>
              <input
                value={row.value}
                onChange={(e) => updateScoring(i, 'value', e.target.value)}
              />
            </div>
            <div className="field">
              <label>Etiqueta visible</label>
              <input
                value={row.label}
                onChange={(e) => updateScoring(i, 'label', e.target.value)}
              />
            </div>
            <div className="field" style={{ maxWidth: 120 }}>
              <label>&nbsp;</label>
              <button
                type="button"
                className="btn btn-secondary"
                style={{ fontSize: 12 }}
                onClick={() =>
                  setDraft((d) => ({
                    ...d,
                    scoringProducts: d.scoringProducts.filter((_, j) => j !== i)
                  }))
                }
              >
                Quitar
              </button>
            </div>
          </div>
        ))}
        <button
          type="button"
          className="btn btn-secondary"
          style={{ marginTop: 8 }}
          onClick={() =>
            setDraft((d) => ({
              ...d,
              scoringProducts: [
                ...d.scoringProducts,
                { value: `prod_${Date.now()}`, label: 'Nuevo producto' }
              ]
            }))
          }
        >
          Añadir opción
        </button>
      </div>

      <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', marginTop: 20, alignItems: 'center' }}>
        <button type="button" className="btn btn-primary" onClick={save}>
          Guardar catálogo
        </button>
        <button type="button" className="btn btn-secondary" onClick={restoreDefaults}>
          Restaurar valores por defecto
        </button>
        {savedMsg && (
          <span style={{ fontSize: 13, color: 'var(--text-muted)' }}>{savedMsg}</span>
        )}
      </div>
    </div>
  );
}

// MÓDULO — Histórico (generados + pipeline)

function formatHistDate(ts) {
  if (ts == null) return '—';
  const d = new Date(ts);
  if (Number.isNaN(d.getTime())) return '—';
  return d.toLocaleString('es-ES', { dateStyle: 'short', timeStyle: 'short' });
}

function ModuleHistoric() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState('');
  const [filter, setFilter] = useState('all');
  const [openId, setOpenId] = useState(null);
  const [detailHtml, setDetailHtml] = useState(null);
  const [detailLoading, setDetailLoading] = useState(false);

  const load = async () => {
    setLoading(true);
    setErr('');
    try {
      const res = await fetch('/api/activity?limit=300');
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.error?.message || `Error ${res.status}`);
      }
      setItems(Array.isArray(data.items) ? data.items : []);
    } catch (e) {
      setErr(e.message || 'No se pudo cargar el histórico.');
      setItems([]);
    }
    setLoading(false);
  };

  useEffect(() => {
    load();
  }, []);

  const filtered = useMemo(() => {
    if (filter === 'all') return items;
    if (filter === 'generated') return items.filter((i) => i.feedType === 'generated');
    if (filter === 'pipeline_lead') {
      return items.filter((i) => i.feedType === 'pipeline_lead');
    }
    return items.filter(
      (i) => i.feedType === 'generated' && i.subtype === filter
    );
  }, [items, filter]);

  const toggle = async (row) => {
    const rid = `${row.feedType}-${row.id}`;
    if (openId === rid) {
      setOpenId(null);
      setDetailHtml(null);
      setDetailLoading(false);
      return;
    }
    setOpenId(rid);
    setDetailHtml(null);
    if (row.feedType === 'generated') {
      setDetailLoading(true);
      try {
        const res = await fetch(
          `/api/generated?id=${encodeURIComponent(row.id)}`
        );
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.item && data.item.bodyHtml) {
          setDetailHtml(data.item.bodyHtml);
        }
      } catch (_) {
        /* vacío */
      }
      setDetailLoading(false);
    } else {
      setDetailLoading(false);
    }
  };

  const filterBtns = [
    { id: 'all', label: 'Todo' },
    { id: 'generated', label: 'Generado' },
    { id: 'prospect_email', label: 'Emails' },
    { id: 'seo', label: 'SEO' },
    { id: 'newsletter', label: 'Newsletter' },
    { id: 'pipeline_lead', label: 'Scoring / pipeline' }
  ];

  return (
    <div>
      <div className="module-header">
        <div className="module-tag">DATOS · ACTIVIDAD</div>
        <div className="module-title">Histórico compartido</div>
        <div className="module-desc">
          Todos los emails, newsletters, contenidos SEO guardados en la base de datos,
          más los leads añadidos al pipeline desde el scoring. Al desplegar una fila
          de tipo generado se carga la vista previa HTML completa.
        </div>
      </div>

      <div className="hist-filters">
        {filterBtns.map((b) => (
          <button
            key={b.id}
            type="button"
            className={`hist-filter-btn ${filter === b.id ? 'on' : ''}`}
            onClick={() => setFilter(b.id)}
          >
            {b.label}
          </button>
        ))}
        <button
          type="button"
          className="btn btn-secondary"
          style={{ marginLeft: 'auto' }}
          onClick={load}
          disabled={loading}
        >
          Actualizar
        </button>
      </div>

      {loading && (
        <div className="card">
          <div className="loading">
            <div className="spinner" />
            Cargando actividad…
          </div>
        </div>
      )}
      {!loading && err && (
        <div className="card ls-error-card">
          <div className="card-title ls-error-title">Sin datos o error</div>
          <div className="ls-error-text">{err}</div>
          <p style={{ marginTop: 10, fontSize: 12, color: 'var(--text-muted)' }}>
            Comprueba <code>DATABASE_URL</code> en local o Neon enlazado en Netlify.
          </p>
        </div>
      )}
      {!loading && !err && filtered.length === 0 && (
        <p style={{ color: 'var(--text-muted)', fontSize: 13 }}>
          No hay entradas con este filtro. Genera contenido con la API configurada y
          guarda leads en el pipeline.
        </p>
      )}
      {!loading &&
        filtered.map((row) => {
          const rid = `${row.feedType}-${row.id}`;
          const open = openId === rid;
          const typeLabel =
            row.feedType === 'generated'
              ? row.subtype === 'prospect_email'
                ? 'Email'
                : row.subtype === 'seo'
                  ? 'SEO'
                  : row.subtype === 'newsletter'
                    ? 'Newsletter'
                    : row.subtype
              : 'Scoring';
          return (
            <div key={rid} className="hist-row">
              <div className="hist-row-head" onClick={() => toggle(row)}>
                <div>
                  <div className="hist-type-pill">{typeLabel}</div>
                  <div className="hist-title">{row.title}</div>
                  <div className="hist-sub">{row.subtitle}</div>
                </div>
                <div className="hist-date">{formatHistDate(row.createdAt)}</div>
              </div>
              {open && (
                <div className="hist-body">
                  {row.snippet && (
                    <div className="hist-snippet">{row.snippet}</div>
                  )}
                  {row.feedType === 'generated' &&
                    (detailLoading ? (
                      <p style={{ color: 'var(--text-muted)' }}>
                        Cargando vista previa…
                      </p>
                    ) : (
                      detailHtml && (
                        <div className="hist-preview-box">
                          <iframe
                            title="Vista previa histórico"
                            sandbox
                            srcDoc={wrapPreviewDoc(detailHtml)}
                          />
                        </div>
                      )
                    ))}
                  {row.feedType === 'pipeline_lead' && row.result && (
                    <div>
                      <p style={{ marginBottom: 10 }}>
                        <strong>Score:</strong> {row.result.score} ·{' '}
                        <strong>Tier:</strong> {row.result.tier} (
                        {row.result.tier_label})
                      </p>
                      <div className="ls-approach">
                        <h4>Enfoque recomendado</h4>
                        {row.result.recommended_approach}
                      </div>
                      {(row.result.priority_actions || []).length > 0 && (
                        <div style={{ marginTop: 12 }}>
                          <strong>Acciones</strong>
                          <ul className="crm-enrich-list">
                            {(row.result.priority_actions || []).map((a, i) => (
                              <li key={i}>{a}</li>
                            ))}
                          </ul>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
    </div>
  );
}
