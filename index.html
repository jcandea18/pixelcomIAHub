function inferOutputLangFromPaisForCrm(pais) {
  const p = String(pais || '').toLowerCase();
  if (/francia|france|\bfr\b/.test(p)) return 'frances';
  if (/reino unido|uk|brit|inglaterra|england|scotland|wales/.test(p)) return 'ingles';
  if (/usa|estados unidos|united states|\bus\b/.test(p)) return 'ingles';
  if (/belgica|belgium|belgique/.test(p)) return 'frances';
  if (/suiza|switzerland|schweiz/.test(p)) return 'aleman';
  if (/luxembourg|luxemburgo/.test(p)) return 'frances';
  if (/alemania|germany|deutschland/.test(p)) return 'aleman';
  if (/italia|italy|italie/.test(p)) return 'italiano';
  if (/portugal/.test(p)) return 'portugues';
  if (/holanda|netherlands|países bajos|nederland/.test(p)) return 'holandes';
  if (/españa|spain|espagne/.test(p)) return 'espanol';
  return 'espanol';
}

function ModuleCRM() {
  const [contacts, setContacts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState('');
  const [form, setForm] = useState({
    nombre: '',
    empresa: '',
    email: '',
    telefono: '',
    pais: '',
    web: '',
    notas: ''
  });
  const [editId, setEditId] = useState(null);
  const [saving, setSaving] = useState(false);
  /** Contacto cuyo detalle se muestra en modal */
  const [viewContactId, setViewContactId] = useState(null);
  const [detailNotesDraft, setDetailNotesDraft] = useState('');
  const [notesSaving, setNotesSaving] = useState(false);
  const [enrichingId, setEnrichingId] = useState(null);
  const [mailBriefById, setMailBriefById] = useState({});
  const [nextMailLoadingId, setNextMailLoadingId] = useState(null);
  const [nextMailTextById, setNextMailTextById] = useState({});
  const [nextMailSavedDbIdByContact, setNextMailSavedDbIdByContact] =
    useState({});

  const { catalog: crmCatalog } = usePixelcomCatalog();

  const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));

  const load = async () => {
    setLoading(true);
    setErr('');
    try {
      const res = await fetch('/api/crm');
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.error?.message || `Error ${res.status}`);
      }
      setContacts(Array.isArray(data.contacts) ? data.contacts : []);
    } catch (e) {
      setErr(e.message || 'No se pudo cargar el CRM.');
      setContacts([]);
    }
    setLoading(false);
  };

  useEffect(() => {
    load();
  }, []);

  useEffect(() => {
    if (!viewContactId) return;
    const onKey = (e) => {
      if (e.key === 'Escape') setViewContactId(null);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [viewContactId]);

  useEffect(() => {
    if (
      viewContactId &&
      !contacts.some((c) => c.id === viewContactId)
    ) {
      setViewContactId(null);
    }
  }, [contacts, viewContactId]);

  const openContactDetail = (c, opts = {}) => {
    setViewContactId(c.id);
    setDetailNotesDraft(c.notas || '');
    setErr('');
    if (opts.scrollMail) {
      setTimeout(() => {
        document
          .getElementById(`crm-mail-${c.id}`)
          ?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 280);
    }
  };

  const resetForm = () => {
    setForm({
      nombre: '',
      empresa: '',
      email: '',
      telefono: '',
      pais: '',
      web: '',
      notas: ''
    });
    setEditId(null);
  };

  const save = async () => {
    if (!form.nombre.trim() || !form.empresa.trim()) {
      setErr('Nombre y empresa son obligatorios.');
      return;
    }
    setSaving(true);
    setErr('');
    try {
      const method = editId ? 'PUT' : 'POST';
      const body = editId ? { ...form, id: editId } : { ...form };
      const res = await fetch('/api/crm', {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.error?.message || `Error ${res.status}`);
      }
      if (data.entry) {
        if (editId) {
          setContacts((prev) =>
            prev.map((c) => (c.id === data.entry.id ? data.entry : c))
          );
        } else {
          setContacts((prev) => [data.entry, ...prev]);
          logActivity('crm', 'create', { id: data.entry.id });
        }
        resetForm();
      }
    } catch (e) {
      setErr(e.message);
    }
    setSaving(false);
  };

  const loadEdit = (c) => {
    setEditId(c.id);
    setForm({
      nombre: c.nombre || '',
      empresa: c.empresa || '',
      email: c.email || '',
      telefono: c.telefono || '',
      pais: c.pais || '',
      web: c.web || '',
      notas: c.notas || ''
    });
  };

  const remove = async (id) => {
    if (!window.confirm('¿Eliminar este contacto del CRM?')) return;
    try {
      const res = await fetch(`/api/crm?id=${encodeURIComponent(id)}`, {
        method: 'DELETE'
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.error?.message || `Error ${res.status}`);
      }
      setContacts((prev) => prev.filter((c) => c.id !== id));
      if (editId === id) resetForm();
      if (viewContactId === id) setViewContactId(null);
      logActivity('crm', 'delete', { id });
    } catch (e) {
      setErr(e.message);
    }
  };

  const enrich = async (id) => {
    setEnrichingId(id);
    setErr('');
    const contactBefore = contacts.find((c) => c.id === id);
    const enrichedBefore =
      contactBefore?.enrichedAt != null
        ? Number(contactBefore.enrichedAt)
        : null;

    try {
      const res = await fetch('/api/crm/enrich', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          id,
          catalogFull: crmCatalog.fullText
        })
      });

      /** Netlify Background Function: 202 y trabajo largo en servidor (sin 504) */
      if (res.status === 202) {
        const deadline = Date.now() + 5 * 60 * 1000;
        let done = false;
        while (Date.now() < deadline && !done) {
          await new Promise((r) => setTimeout(r, 2500));
          const res2 = await fetch('/api/crm');
          const data2 = await res2.json().catch(() => ({}));
          if (!res2.ok) continue;
          const entry = (data2.contacts || []).find((c) => c.id === id);
          if (!entry) continue;
          const at =
            entry.enrichedAt != null ? Number(entry.enrichedAt) : null;
          const isNew =
            enrichedBefore == null
              ? at != null
              : at != null && at > enrichedBefore;
          if (isNew && entry.enrichment) {
            setContacts((prev) =>
              prev.map((c) => (c.id === entry.id ? entry : c))
            );
            openContactDetail(entry);
            logActivity('crm', 'enrich', { id });
            done = true;
          }
        }
        if (!done) {
          setErr(
            'No se recibió el enriquecimiento a tiempo. Revisa los logs de la función en Netlify o reintenta en unos minutos.'
          );
        }
        setEnrichingId(null);
        return;
      }

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const msg =
          data.error?.message ||
          (typeof data.error === 'string' ? data.error : null) ||
          `Error ${res.status}`;
        throw new Error(msg);
      }
      if (data.entry) {
        setContacts((prev) =>
          prev.map((c) => (c.id === data.entry.id ? data.entry : c))
        );
        openContactDetail(data.entry);
        logActivity('crm', 'enrich', {
          id,
          webSources: data.webSearch?.sourcesCount
        });
      }
    } catch (e) {
      setErr(e.message);
    }
    setEnrichingId(null);
  };

  const modalContact = viewContactId
    ? contacts.find((x) => x.id === viewContactId)
    : null;

  const saveDetailNotes = async () => {
    const c = modalContact;
    if (!c) return;
    setNotesSaving(true);
    setErr('');
    try {
      const res = await fetch('/api/crm', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          id: c.id,
          nombre: c.nombre,
          empresa: c.empresa,
          email: c.email,
          telefono: c.telefono,
          pais: c.pais,
          web: c.web,
          notas: detailNotesDraft
        })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.error?.message || `Error ${res.status}`);
      }
      if (data.entry) {
        setContacts((prev) =>
          prev.map((x) => (x.id === data.entry.id ? data.entry : x))
        );
        if (editId === data.entry.id) {
          setForm((f) => ({ ...f, notas: data.entry.notas || '' }));
        }
      }
    } catch (e) {
      setErr(e.message);
    }
    setNotesSaving(false);
  };

  const generateNextMail = async (c) => {
    setNextMailLoadingId(c.id);
    setErr('');
    setNextMailSavedDbIdByContact((prev) => ({ ...prev, [c.id]: null }));
    try {
      const res = await fetch('/api/crm/next-mail', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          id: c.id,
          brief: mailBriefById[c.id] || '',
          catalogShort: crmCatalog.shortText
        })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const msg =
          data.error?.message ||
          (typeof data.error === 'string' ? data.error : null) ||
          `Error ${res.status}`;
        throw new Error(msg);
      }
      const raw = data.text || '';
      setNextMailTextById((prev) => ({ ...prev, [c.id]: raw }));
      const parsed = parseEmailJson(raw);
      const lang =
        data.outputLanguage || inferOutputLangFromPaisForCrm(c.pais);
      if (parsed) {
        const entry = await persistGenerated({
          kind: 'prospect_email',
          outputLanguage: lang,
          input: {
            tipo: 'crm_siguiente_mail',
            crm_contact_id: c.id,
            nombre: c.nombre,
            empresa: c.empresa,
            brief: mailBriefById[c.id] || ''
          },
          bodyHtml: parsed.html,
          bodyPlain: parsed.text,
          subject: parsed.subject
        });
        if (entry?.id) {
          setNextMailSavedDbIdByContact((prev) => ({
            ...prev,
            [c.id]: entry.id
          }));
        }
      }
      logActivity('crm', 'next_mail', { id: c.id });
    } catch (e) {
      setErr(e.message || 'Error al generar el correo.');
      setNextMailSavedDbIdByContact((prev) => ({ ...prev, [c.id]: null }));
      setNextMailTextById((prev) => {
        const next = { ...prev };
        delete next[c.id];
        return next;
      });
    }
    setNextMailLoadingId(null);
  };

  const encClass = (v) => {
    if (v === 'alto') return 'crm-enc-alto';
    if (v === 'bajo') return 'crm-enc-bajo';
    return 'crm-enc-medio';
  };

  const renderEnrichment = (en) => {
    if (!en || typeof en !== 'object') return null;
    return (
      <div className="crm-enrich-box">
        <div style={{ marginBottom: 10 }}>
          <span
            className={`crm-badge-enc ${encClass(en.encaje_pixelcom)}`}
          >
            Encaje Pixelcom: {en.encaje_pixelcom || '—'}
          </span>
        </div>
        <div className="crm-enrich-kv">
          <strong>Resumen</strong>
          {en.resumen_contacto}
        </div>
        <div className="crm-enrich-kv">
          <strong>Hipótesis empresa</strong>
          {en.hipotesis_empresa}
        </div>
        <div className="crm-enrich-kv">
          <strong>Hipótesis rol</strong>
          {en.hipotesis_rol || '—'}
        </div>
        <div className="crm-enrich-kv">
          <strong>Razón de encaje</strong>
          {en.razon_encaje || '—'}
        </div>
        {en.web_search_provider === 'anthropic' && (
          <p style={{ fontSize: 11, color: 'var(--text-faint)', marginBottom: 8 }}>
            Búsqueda web: Anthropic Messages API
            {en.web_search_tool ? ` · ${en.web_search_tool}` : ''}
          </p>
        )}
        {(Array.isArray(en.fuentes_web) && en.fuentes_web.length > 0) && (
          <div className="crm-enrich-kv">
            <strong>Fuentes web consultadas</strong>
            <ul className="crm-enrich-list" style={{ listStyle: 'none', paddingLeft: 0 }}>
              {(en.fuentes_web || []).map((f, i) => (
                <li key={i} style={{ marginBottom: 6 }}>
                  <a
                    href={f.url}
                    target="_blank"
                    rel="noopener noreferrer"
                    style={{ color: 'var(--accent)', wordBreak: 'break-all' }}
                  >
                    {f.title || f.url}
                  </a>
                </li>
              ))}
            </ul>
          </div>
        )}
        {(Array.isArray(en.web_search_queries) && en.web_search_queries.length > 0) && (
          <p style={{ fontSize: 11, color: 'var(--text-faint)', marginBottom: 10 }}>
            <strong style={{ display: 'block', marginBottom: 4 }}>Consultas enviadas al buscador</strong>
            {(en.web_search_queries || []).join(' · ')}
          </p>
        )}
        {(en.angulos_comerciales || []).length > 0 && (
          <div className="crm-enrich-kv">
            <strong>Ángulos comerciales</strong>
            <ul className="crm-enrich-list">
              {(en.angulos_comerciales || []).map((x, i) => (
                <li key={i}>{x}</li>
              ))}
            </ul>
          </div>
        )}
        {(en.preguntas_descubrimiento || []).length > 0 && (
          <div className="crm-enrich-kv">
            <strong>Preguntas de descubrimiento</strong>
            <ul className="crm-enrich-list">
              {(en.preguntas_descubrimiento || []).map((x, i) => (
                <li key={i}>{x}</li>
              ))}
            </ul>
          </div>
        )}
        {(en.riesgos_dudas || []).length > 0 && (
          <div className="crm-enrich-kv">
            <strong>Riesgos / dudas</strong>
            <ul className="crm-enrich-list">
              {(en.riesgos_dudas || []).map((x, i) => (
                <li key={i}>{x}</li>
              ))}
            </ul>
          </div>
        )}
        <div className="crm-enrich-kv">
          <strong>Siguiente paso</strong>
          {en.siguiente_paso}
        </div>
        {(en.datos_a_verificar || []).length > 0 && (
          <div className="crm-enrich-kv">
            <strong>Datos a verificar</strong>
            <ul className="crm-enrich-list">
              {(en.datos_a_verificar || []).map((x, i) => (
                <li key={i}>{x}</li>
              ))}
            </ul>
          </div>
        )}
        {en.disclaimer && (
          <p
            style={{
              marginTop: 12,
              fontSize: 11,
              color: 'var(--text-faint)',
              fontStyle: 'italic'
            }}
          >
            {en.disclaimer}
          </p>
        )}
      </div>
    );
  };

  return (
    <div>
      <div className="module-header">
        <div className="module-tag">COMERCIAL · CRM</div>
        <div className="module-title">CRM de clientes</div>
        <div className="module-desc">
          Alta de contactos, enriquecimiento con <strong>búsqueda web nativa de Anthropic</strong>{' '}
          (herramienta <code style={{ fontSize: 11 }}>web_search</code> en la API; debe estar activada
          en tu cuenta) y acción <strong>Próximo mail</strong>. Configura{' '}
          <code style={{ fontSize: 11 }}>ANTHROPIC_API_KEY</code> en el servidor. Verifica los datos antes
          de decidir.
        </div>
      </div>

      <div className="card">
        <div className="card-title">
          {editId ? 'Editar contacto' : 'Nuevo contacto'}
        </div>
        <div className="form-grid">
          <div className="field">
            <label>Nombre *</label>
            <input
              value={form.nombre}
              onChange={(e) => set('nombre', e.target.value)}
              placeholder="Nombre del contacto"
            />
          </div>
          <div className="field">
            <label>Empresa *</label>
            <input
              value={form.empresa}
              onChange={(e) => set('empresa', e.target.value)}
              placeholder="Razón social o marca"
            />
          </div>
          <div className="field">
            <label>Email</label>
            <input
              type="email"
              value={form.email}
              onChange={(e) => set('email', e.target.value)}
            />
          </div>
          <div className="field">
            <label>Teléfono</label>
            <input
              value={form.telefono}
              onChange={(e) => set('telefono', e.target.value)}
            />
          </div>
          <div className="field">
            <label>País</label>
            <input
              value={form.pais}
              onChange={(e) => set('pais', e.target.value)}
              placeholder="Francia, España…"
            />
          </div>
          <div className="field">
            <label>Web</label>
            <input
              value={form.web}
              onChange={(e) => set('web', e.target.value)}
              placeholder="https://…"
            />
          </div>
          <div className="field" style={{ gridColumn: 'span 2' }}>
            <label>Notas (contexto para la IA)</label>
            <textarea
              value={form.notas}
              onChange={(e) => set('notas', e.target.value)}
              placeholder="Sector, feria donde los conociste, producto de interés…"
              style={{ minHeight: 88 }}
            />
          </div>
        </div>
        <div style={{ display: 'flex', gap: 10, marginTop: 8, flexWrap: 'wrap' }}>
          <button
            type="button"
            className="btn btn-primary"
            onClick={save}
            disabled={saving}
          >
            {saving ? 'Guardando…' : editId ? 'Actualizar' : 'Dar de alta'}
          </button>
          {editId && (
            <button type="button" className="btn btn-secondary" onClick={resetForm}>
              Cancelar edición
            </button>
          )}
        </div>
      </div>

      {err && (
        <div className="card ls-error-card" style={{ marginBottom: 16 }}>
          <div className="ls-error-text">{err}</div>
        </div>
      )}

      {loading && (
        <div className="card">
          <div className="loading">
            <div className="spinner" />
            Cargando contactos…
          </div>
        </div>
      )}
      {!loading && (
        <div className="card">
          <div className="card-title">Contactos ({contacts.length})</div>
          {contacts.length === 0 ? (
            <p style={{ fontSize: 13, color: 'var(--text-muted)' }}>
              Aún no hay contactos. Con la base de datos conectada, aparecerán aquí.
            </p>
          ) : (
            <div style={{ overflowX: 'auto' }}>
              <table className="crm-table">
                <thead>
                  <tr>
                    <th>Empresa</th>
                    <th>Contacto</th>
                    <th>País</th>
                    <th>IA</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
                <tbody>
                  {contacts.map((c) => (
                    <React.Fragment key={c.id}>
                      <tr>
                        <td>{c.empresa}</td>
                        <td>{c.nombre}</td>
                        <td>{c.pais || '—'}</td>
                        <td>
                          {c.enrichment ? (
                            <span
                              className={`crm-badge-enc ${encClass(
                                c.enrichment.encaje_pixelcom
                              )}`}
                            >
                              {c.enrichment.encaje_pixelcom || 'ok'}
                            </span>
                          ) : (
                            '—'
                          )}
                        </td>
                        <td>
                          <div className="crm-actions">
                            <button
                              type="button"
                              className="crm-action-btn"
                              onClick={() => openContactDetail(c)}
                            >
                              Ver
                            </button>
                            <button
                              type="button"
                              className="crm-action-btn"
                              onClick={() => loadEdit(c)}
                            >
                              Editar
                            </button>
                            <button
                              type="button"
                              className="crm-action-btn"
                              onClick={() => enrich(c.id)}
                              disabled={enrichingId === c.id}
                            >
                              {enrichingId === c.id ? 'IA…' : 'Enriquecer IA'}
                            </button>
                            <button
                              type="button"
                              className="crm-action-btn"
                              onClick={() =>
                                openContactDetail(c, { scrollMail: true })
                              }
                            >
                              Próximo mail
                            </button>
                            <button
                              type="button"
                              className="crm-action-btn crm-action-danger"
                              onClick={() => remove(c.id)}
                            >
                              Eliminar
                            </button>
                          </div>
                        </td>
                      </tr>
                    </React.Fragment>
                  ))}
                </tbody>
              </table>
            </div>
          )}
          <button
            type="button"
            className="btn btn-secondary"
            style={{ marginTop: 14 }}
            onClick={load}
          >
            Refrescar lista
          </button>
        </div>
      )}

      {modalContact && (
        <div
          className="crm-modal-overlay"
          onClick={(e) => {
            if (e.target === e.currentTarget) setViewContactId(null);
          }}
        >
          <div
            className="crm-modal-panel"
            role="dialog"
            aria-modal="true"
            aria-labelledby="crm-modal-title"
            onClick={(e) => e.stopPropagation()}
          >
            <div className="crm-modal-head">
              <div>
                <div
                  style={{
                    fontSize: 11,
                    color: 'var(--text-faint)',
                    textTransform: 'uppercase',
                    letterSpacing: '0.04em'
                  }}
                >
                  Contacto
                </div>
                <h2
                  id="crm-modal-title"
                  style={{
                    fontSize: 18,
                    fontWeight: 600,
                    margin: '4px 0 2px',
                    lineHeight: 1.25
                  }}
                >
                  {modalContact.empresa}
                </h2>
                <div style={{ fontSize: 14, color: 'var(--text-muted)' }}>
                  {modalContact.nombre}
                </div>
              </div>
              <button
                type="button"
                className="crm-modal-close"
                onClick={() => setViewContactId(null)}
                aria-label="Cerrar ventana"
              >
                ×
              </button>
            </div>

            <div className="crm-modal-body">
              <div className="crm-modal-section">
                <div className="crm-modal-section-title">Datos</div>
                <div style={{ fontSize: 13, lineHeight: 1.65, color: 'var(--text)' }}>
                  <strong style={{ color: 'var(--text-muted)' }}>Email:</strong>{' '}
                  {modalContact.email || '—'}
                  <br />
                  <strong style={{ color: 'var(--text-muted)' }}>Teléfono:</strong>{' '}
                  {modalContact.telefono || '—'}
                  <br />
                  <strong style={{ color: 'var(--text-muted)' }}>Web:</strong>{' '}
                  {modalContact.web ? (
                    <a href={modalContact.web.startsWith('http') ? modalContact.web : `https://${modalContact.web}`} target="_blank" rel="noopener noreferrer">
                      {modalContact.web}
                    </a>
                  ) : (
                    '—'
                  )}
                  <br />
                  <strong style={{ color: 'var(--text-muted)' }}>País:</strong>{' '}
                  {modalContact.pais || '—'}
                </div>
              </div>

              <div className="crm-modal-section">
                <div className="crm-modal-section-title">Notas internas</div>
                <p style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 10, lineHeight: 1.5 }}>
                  Contexto comercial, ferias, producto de interés o seguimiento. Se guardan en el contacto y pueden usarlas las demás herramientas de IA.
                </p>
                <div className="crm-notes-box">
                  <textarea
                    value={detailNotesDraft}
                    onChange={(e) => setDetailNotesDraft(e.target.value)}
                    placeholder="Ej.: Interesado en Pixeltiming All-in-One; nos vimos en feria Offenbach 2026…"
                  />
                  <button
                    type="button"
                    className="btn btn-primary"
                    style={{ fontSize: 12, padding: '8px 16px' }}
                    onClick={saveDetailNotes}
                    disabled={notesSaving}
                  >
                    {notesSaving ? 'Guardando…' : 'Guardar notas'}
                  </button>
                </div>
              </div>

              <div style={{ marginBottom: 18 }}>
                <button
                  type="button"
                  className="btn btn-secondary"
                  style={{ fontSize: 12 }}
                  onClick={() => {
                    loadEdit(modalContact);
                    setViewContactId(null);
                  }}
                >
                  Editar todos los datos en el formulario
                </button>
              </div>

              <div className="crm-modal-section">
                <div className="crm-modal-section-title">Perfil IA (web)</div>
                {renderEnrichment(modalContact.enrichment)}
                {!modalContact.enrichment && (
                  <p style={{ fontSize: 12, color: 'var(--text-faint)', marginTop: 8 }}>
                    Pulsa «Enriquecer IA» en la tabla para generar el perfil con búsqueda web.
                  </p>
                )}
              </div>

              <div
                id={`crm-mail-${modalContact.id}`}
                style={{
                  marginTop: 8,
                  paddingTop: 18,
                  borderTop: '1px solid var(--border)'
                }}
              >
                <div className="card-title">Próximo mail al cliente</div>
                <p style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 12, lineHeight: 1.6 }}>
                  Genera un correo de <strong>seguimiento</strong> (no primer contacto en frío)
                  usando datos del CRM y, si existe, el enriquecimiento IA. Idioma según país del contacto.
                  Se guarda en el histórico como email de prospecto (tipo CRM).
                </p>
                <div className="field" style={{ marginBottom: 12 }}>
                  <label>Brief opcional para este correo</label>
                  <textarea
                    value={mailBriefById[modalContact.id] || ''}
                    onChange={(e) =>
                      setMailBriefById((prev) => ({
                        ...prev,
                        [modalContact.id]: e.target.value
                      }))
                    }
                    placeholder="Ej.: proponer demo Pixeltiming 30 min, mencionar feria donde hablamos…"
                    style={{ minHeight: 72 }}
                  />
                </div>
                <button
                  type="button"
                  className="btn btn-primary"
                  style={{ marginBottom: 16 }}
                  onClick={() => generateNextMail(modalContact)}
                  disabled={nextMailLoadingId === modalContact.id}
                >
                  {nextMailLoadingId === modalContact.id
                    ? 'Generando correo…'
                    : 'Generar próximo mail'}
                </button>
                <OutputBlock
                  result={nextMailTextById[modalContact.id] || ''}
                  loading={nextMailLoadingId === modalContact.id}
                  error=""
                  variant="email"
                  savedEntryId={
                    nextMailSavedDbIdByContact[modalContact.id] ?? null
                  }
                  onPersisted={(entry) =>
                    entry &&
                    setNextMailTextById((prev) => ({
                      ...prev,
                      [modalContact.id]: generatedEntryToResult(entry, 'email')
                    }))
                  }
                />
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// APP SHELL
// ══════════════════════════════════════════════════════════════
const MODULES = [
  { id: 'email', label: 'Email prospecto', group: 'Comercial' },
  { id: 'scoring', label: 'Scoring leads', group: 'Comercial' },
  { id: 'crm', label: 'CRM', group: 'Comercial' },
  { id: 'contenidos', label: 'Contenidos SEO', group: 'Marketing' },
  { id: 'newsletter', label: 'Newsletter', group: 'Marketing' },
  { id: 'bi', label: 'Dashboard BI', group: 'Dirección' },
  { id: 'q2c', label: 'Quote-to-Cash', group: 'Operaciones' },
  { id: 'catalogo', label: 'Catálogo', group: 'Datos' },
  { id: 'historico', label: 'Histórico', group: 'Datos' }
];

function App() {
  const [active, setActive] = useState('email');
  const apiKey = 'server';

  const groups = [...new Set(MODULES.map(m => m.group))];

  return (
    <div>
      <div className="header">
        <div className="header-logo">
          <img
            src="https://pixelcom.es/wp-content/uploads/2023/07/Logos-Pixelcom-black-red.png.webp"
            alt="Pixelcom"
            loading="eager"
          />
          <div className="product">AI Hub</div>
        </div>
        <div className="header-badge">Pixelcom</div>
      </div>

      <div className="layout">
        <div className="sidebar">
          {groups.map(g => (
            <div key={g}>
              <div className="sidebar-section">{g}</div>
              {MODULES.filter(m => m.group === g).map(m => (
                <div key={m.id}
                  className={`sidebar-item ${active === m.id ? 'active' : ''}`}
                  onClick={() => setActive(m.id)}>
                  <div className="sidebar-dot" />
                  {m.label}
                </div>
              ))}
            </div>
          ))}
          <div className="sidebar-section" style={{marginTop:32}}>Info</div>
          <div className="sidebar-item" style={{cursor:'default',opacity:0.5}}>
            <div className="sidebar-dot" />
            Pixelcom AI Hub
          </div>
        </div>

        <div className="main">
          {active === 'email' && <Module1 apiKey={apiKey} />}
          {active === 'scoring' && <Module4 />}
          {active === 'crm' && <ModuleCRM />}
          {active === 'contenidos' && <Module2 apiKey={apiKey} />}
          {active === 'newsletter' && <Module3 apiKey={apiKey} />}
          {active === 'bi' && <ModuleBI />}
          {active === 'q2c' && <ModuleQuoteToCash />}
          {active === 'catalogo' && <ModuleCatalog />}
          {active === 'historico' && <ModuleHistoric />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
