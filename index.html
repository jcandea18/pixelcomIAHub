<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixelcom · Marketing AI Hub</title>
<link rel="icon" href="https://pixelcom.es/wp-content/uploads/2024/01/cropped-pixelcom-icono.png.webp" type="image/x-icon">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F9FC;
    --surface: #FFFFFF;
    --surface2: #F1F5F9;
    --border: #E2E8F0;
    --border-strong: #CBD5E1;
    --text: #0F172A;
    --text-muted: #475569;
    --text-faint: #94A3B8;
    --accent: #D4141D;         /* Pixelcom red-ish */
    --accent-light: #FDECEC;   /* soft red tint */
    --accent-dark: #A30F15;
    --warn: #B45309;
    --warn-light: #FFF7ED;
    --radius: 12px;
    --radius-lg: 18px;
  }

  body {
    font-family: 'Roboto', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* Header */
  .header {
    background: var(--surface);
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--border);
    border-top: 6px solid var(--accent);
  }
  .header-logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .header-logo img {
    height: 24px;
    width: auto;
    display: block;
  }
  .header-logo .product {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3px;
    color: var(--text-muted);
    border-left: 1px solid var(--border);
    padding-left: 10px;
  }
  .header-badge {
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    border: 1px solid rgba(212,20,29,0.28);
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    background: var(--accent-light);
  }

  /* Layout */
  .layout { display: flex; min-height: calc(100vh - 64px); }

  /* Sidebar */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--surface);
    padding: 18px 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
    border-right: 1px solid var(--border);
  }
  .sidebar-section {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.2px;
    color: var(--text-faint);
    padding: 0 20px;
    margin: 16px 0 8px;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    border-left: 3px solid transparent;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 400;
    user-select: none;
  }
  .sidebar-item:hover { background: #F8FAFC; color: var(--text); }
  .sidebar-item.active {
    background: var(--accent-light);
    border-left-color: var(--accent);
    color: var(--accent-dark);
    font-weight: 600;
  }
  .sidebar-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  /* Main */
  .main { flex: 1; padding: 32px 40px; overflow-y: auto; max-width: 1040px; }

  /* Module header */
  .module-header { margin-bottom: 28px; }
  .module-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.8px;
    color: var(--accent);
    background: var(--accent-light);
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  .module-title {
    font-size: 30px;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 8px;
    font-weight: 600;
    letter-spacing: -0.4px;
  }
  .module-desc { font-size: 14px; color: var(--text-muted); line-height: 1.7; max-width: 620px; }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    margin-bottom: 20px;
  }
  .card-title {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.6px;
    color: var(--text-muted);
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  /* Form */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid.cols-1 { grid-template-columns: 1fr; }
  .form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; font-weight: 500; color: var(--text-muted); }
  .field input, .field select, .field textarea {
    font-family: inherit;
    font-size: 13px;
    padding: 9px 12px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent);
    background: #fff;
  }
  .field textarea { resize: vertical; min-height: 80px; }

  /* Buttons */
  .btn {
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 20px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent-dark); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border-strong);
  }
  .btn-secondary:hover { background: var(--border); }

  /* Output */
  .output-card {
    background: linear-gradient(180deg, #111827 0%, #0B1220 100%);
    border-radius: var(--radius-lg);
    padding: 24px;
    margin-top: 20px;
    position: relative;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .output-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    color: #FF6B6B;
    margin-bottom: 14px;
  }
  .output-text {
    font-size: 13px;
    color: #E8E6E0;
    line-height: 1.75;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .output-actions {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .btn-copy {
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: #B4B2A9;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-copy:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .btn-copy.copied { color: #5DCAA5; border-color: #5DCAA5; }

  .output-toolbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .output-edit-panel {
    margin-bottom: 14px;
    padding: 14px;
    background: rgba(0,0,0,0.25);
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .output-edit-panel label {
    display: block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: #94a3b8;
    margin-bottom: 4px;
    text-transform: uppercase;
  }
  .output-edit-panel input,
  .output-edit-panel textarea {
    width: 100%;
    box-sizing: border-box;
    font-family: ui-monospace, 'Cascadia Code', Consolas, monospace;
    font-size: 12px;
    line-height: 1.45;
    padding: 10px 12px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.12);
    background: #0f172a;
    color: #e2e8f0;
    margin-bottom: 12px;
  }
  .output-edit-panel textarea { min-height: 120px; resize: vertical; }
  .output-save-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    margin-top: 4px;
  }
  .output-save-msg { font-size: 11px; color: #94a3b8; }
  .output-save-msg.ok { color: #5DCAA5; }
  .output-save-msg.err { color: #fca5a5; }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #FF6B6B;
    font-size: 13px;
    padding: 20px 0;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,107,107,0.22);
    border-top-color: #FF6B6B;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Stats row */
  .stats-row {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
  }
  .stat-label { font-size: 11px; color: var(--text-faint); margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 500; color: var(--text); }
  .stat-sub { font-size: 11px; color: var(--accent); margin-top: 2px; }

  /* Segment pills */
  .pills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .pill {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border-strong);
    cursor: pointer;
    transition: all 0.12s;
    background: var(--bg);
    color: var(--text-muted);
    user-select: none;
  }
  .pill.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 500;
  }
  .pill:hover:not(.selected) { border-color: var(--accent); color: var(--accent); }

  /* Divider */
  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* History */
  .history-item {
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: background 0.12s;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .history-item:hover { background: var(--border); }
  .history-preview { font-size: 12px; color: var(--text-muted); line-height: 1.5; flex: 1; }
  .history-meta { font-size: 11px; color: var(--text-faint); white-space: nowrap; }

  /* Responsive tweak */
  @media (max-width: 700px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-grid.cols-3 { grid-template-columns: 1fr 1fr; }
    .main { padding: 20px; }
    .stats-row { flex-wrap: wrap; }
  }

  .output-header-row { margin-bottom: 10px; }
  .email-subject-preview {
    margin-top: 10px;
    padding: 10px 12px;
    border-radius: var(--radius);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 13px;
    color: #E8E6E0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .email-subject-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.8px;
    color: #94a3b8;
    text-transform: uppercase;
  }

  .output-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;
  }
  .output-tab {
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.14);
    background: rgba(255,255,255,0.05);
    color: #b4b2a9;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .output-tab:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .output-tab.active {
    border-color: #ff6b6b;
    color: #fff;
    background: rgba(255,107,107,0.12);
  }

  .preview-frame {
    width: 100%;
    min-height: 360px;
    border: 0;
    border-radius: 10px;
    background: #fff;
    display: block;
  }
  .output-code {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    font-size: 11px;
    line-height: 1.5;
    color: #c9d1d9;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 14px;
    overflow: auto;
    max-height: 480px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .output-plain {
    background: rgba(0,0,0,0.25);
    border-radius: 10px;
    padding: 16px;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .webhook-status { font-size: 12px; margin-top: 10px; }
  .webhook-status.ok { color: #5dcaa5; }
  .webhook-status.err { color: #f09595; }

  /* Lead scoring — misma línea visual (variables, cards, acento) */
  .ls-subnav {
    display: flex;
    gap: 0;
    margin-bottom: 24px;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--surface);
  }
  .ls-subnav button {
    flex: 1;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 12px 16px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .ls-subnav button:hover { background: var(--surface2); color: var(--text); }
  .ls-subnav button.active {
    background: var(--accent);
    color: #fff;
  }

  .ls-pipeline-col { margin-bottom: 28px; }
  .ls-pipeline-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--accent);
  }

  .ls-lead-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .ls-lead-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
    transition: background 0.12s;
  }
  .ls-lead-head:hover { background: #F8FAFC; }
  .ls-lead-title { font-weight: 600; color: var(--text); }
  .ls-lead-meta { font-size: 11px; color: var(--text-faint); margin-top: 4px; }
  .ls-lead-score { font-size: 20px; font-weight: 700; color: var(--text); }
  .ls-tier-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
  .ls-lead-body {
    border-top: 1px solid var(--border);
    padding: 14px 16px;
    background: var(--surface2);
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.65;
  }
  .ls-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    margin-top: 10px;
  }
  .ls-table th, .ls-table td {
    border: 1px solid var(--border);
    padding: 8px 10px;
    text-align: left;
  }
  .ls-table th { background: var(--surface); color: var(--text-muted); font-weight: 600; }
  .ls-actions-row { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; }
  .ls-link-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: underline;
    padding: 0;
  }
  .ls-link-btn:hover { color: var(--accent-dark); }

  .ls-score-head {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 18px;
  }
  .ls-score-num { font-size: 42px; font-weight: 600; color: var(--text); line-height: 1; letter-spacing: -0.03em; }
  .ls-follow { font-size: 13px; color: var(--text-muted); }
  .ls-est-val { font-size: 13px; color: var(--accent); font-weight: 600; }

  .ls-bar-track {
    height: 14px;
    border-radius: 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .ls-bar-fill {
    height: 100%;
    width: 0%;
    border-radius: 6px;
    transition: width 1.1s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .ls-tier-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
  }

  .ls-approach {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-top: 16px;
    font-size: 13px;
    line-height: 1.65;
    color: var(--text-muted);
  }
  .ls-approach h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); margin-bottom: 8px; }

  .ls-priority-list { margin: 0; padding-left: 18px; color: var(--text); }
  .ls-priority-list li { margin-bottom: 6px; }

  .ls-empty-hint { font-size: 13px; color: var(--text-faint); }
  .ls-error-card { border-color: rgba(212, 20, 29, 0.28) !important; background: var(--accent-light) !important; margin-top: 16px; }
  .ls-error-title { color: var(--accent) !important; }
  .ls-error-text { font-size: 13px; color: var(--accent-dark); }
  .ls-points-pos { font-weight: 600; color: var(--accent-dark); }
  .ls-points-neg { font-weight: 600; color: var(--warn); }

  .card.ls-score-panel { margin-top: 20px; }

  /* Histórico */
  .hist-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 18px;
  }
  .hist-filter-btn {
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .hist-filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .hist-filter-btn.on { background: var(--accent-light); border-color: var(--accent); color: var(--accent-dark); font-weight: 600; }
  .hist-row {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    margin-bottom: 8px;
    overflow: hidden;
  }
  .hist-row-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 14px;
    cursor: pointer;
  }
  .hist-row-head:hover { background: #FAFBFC; }
  .hist-type-pill {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    background: var(--accent-light);
    padding: 2px 8px;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 4px;
  }
  .hist-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .hist-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .hist-date { font-size: 11px; color: var(--text-faint); white-space: nowrap; }
  .hist-body { border-top: 1px solid var(--border); padding: 14px; background: var(--bg); font-size: 12px; }
  .hist-snippet { color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; }
  .hist-preview-box {
    background: #0B1220;
    border-radius: 8px;
    padding: 0;
    margin-top: 8px;
    max-height: 360px;
    overflow: auto;
  }
  .hist-preview-box iframe { width: 100%; min-height: 240px; border: none; }

  /* CRM */
  .crm-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .crm-table th, .crm-table td {
    text-align: left;
    padding: 8px 10px;

const PIXELCOM_CATALOG_DEFAULT_SHORT =

const LS_PIXELCOM_CATALOG = 'pixelcom_catalog_config_v1';

function getDefaultPixelcomCatalog() {
  return {
    fullText: PIXELCOM_CATALOG_DEFAULT_FULL,

    commercialProducts: [
      { value: 'pixeltiming', label: 'Pixeltiming — sistemas karting' },

      { value: 'ambas', label: 'Ambas' },
      { value: 'sin_definir', label: 'Sin definir' }
    ]
  };
}

function mergePixelcomCatalog(saved) {
  const d = getDefaultPixelcomCatalog();
  if (!saved || typeof saved !== 'object') return d;
  return {
    fullText: typeof saved.fullText === 'string' ? saved.fullText : d.fullText,
    shortText: typeof saved.shortText === 'string' ? saved.shortText : d.shortText,
    commercialProducts:
      Array.isArray(saved.commercialProducts) && saved.commercialProducts.length
        ? saved.commercialProducts
        : d.commercialProducts,
    scoringProducts:
      Array.isArray(saved.scoringProducts) && saved.scoringProducts.length
        ? saved.scoringProducts
        : d.scoringProducts
  };
}

function loadPixelcomCatalogFromStorage() {
  try {
    const raw = localStorage.getItem(LS_PIXELCOM_CATALOG);
    if (!raw) return getDefaultPixelcomCatalog();
    return mergePixelcomCatalog(JSON.parse(raw));
  } catch {
    return getDefaultPixelcomCatalog();
  }
}

function productLineLabel(products, value) {
  const x = products.find((p) => p.value === value);
  return x ? x.label : value;
}

function usePixelcomCatalog() {
  const [catalog, setCatalog] = useState(() => loadPixelcomCatalogFromStorage());

  useEffect(() => {
    const sync = () => setCatalog(loadPixelcomCatalogFromStorage());
    window.addEventListener('pixelcom-catalog-changed', sync);
    return () => window.removeEventListener('pixelcom-catalog-changed', sync);
  }, []);

  const saveCatalog = (next) => {
    try {
      localStorage.setItem(LS_PIXELCOM_CATALOG, JSON.stringify(next));
      window.dispatchEvent(new Event('pixelcom-catalog-changed'));
      setCatalog(loadPixelcomCatalogFromStorage());
    } catch (e) {
      alert(e.message || 'No se pudo guardar el catálogo.');
    }
  };

  const resetCatalog = () => {
    try {
      localStorage.removeItem(LS_PIXELCOM_CATALOG);
    } catch (_) {}
    window.dispatchEvent(new Event('pixelcom-catalog-changed'));
    setCatalog(getDefaultPixelcomCatalog());
  };

  return { catalog, saveCatalog, resetCatalog };
}

// ── Anthropic API call ──────────────────────────────────────────
async function callClaude(apiKey, systemPrompt, userPrompt) {
  const res = await fetch('/api/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      systemPrompt,
      userPrompt
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `Error ${res.status}`);
  }
  const data = await res.json();
  return data.text || '';
}

function stripJsonFences(s) {
  let t = (s || '').trim();
  const m = t.match(/^```(?:json)?\s*([\s\S]*?)\s*```$/im);
  if (m) t = m[1].trim();
  return t;
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function stripHtmlTags(html) {
  return String(html || '')
    .replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi, '')
    .replace(/<style[\s\S]*?>[\s\S]*?<\/style>/gi, '')
    .replace(/<[^>]+>/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function parseEmailJson(raw) {
  if (!raw) return null;
  const t = stripJsonFences(raw);
  try {
    const j = JSON.parse(t);
    if (j && typeof j.subject === 'string' && typeof j.html === 'string') {
      return {
        subject: j.subject,
        html: j.html,
        text: typeof j.text === 'string' ? j.text : stripHtmlTags(j.html)
      };
    }
  } catch (_) {}
  return null;
}

function wrapPreviewDoc(bodyHtml) {
  return `<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><style>
    body { font-family: 'Roboto', system-ui, -apple-system, 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.55; color: #0f172a; padding: 20px; max-width: 720px; margin: 0 auto; background: #fff; }
    h1,h2,h3 { line-height: 1.25; }
    a { color: #c41e24; }
  </style></head><body>${bodyHtml}</body></html>`;
}

function coerceContentToHtml(raw) {
  const t = (raw || '').trim();
  if (!t) return '<p></p>';
  if (/<[a-z][\s\S]*>/i.test(t)) return t;
  return t
    .split(/\n\n+/)
    .map((block) => {
      const withBr = block.split(/\n/).map((l) => escapeHtml(l)).join('<br/>');
      return `<p>${withBr}</p>`;
    })
    .join('');
}

async function sendEmailWebhook(body) {
  const res = await fetch('/api/webhook-email', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error?.message || `Error ${res.status}`);
  return data;
}

const LS_STORAGE_KEY = 'pixelcom_leads_v1';

function lsTierColor(tier) {
  if (tier === 'HOT') return '#5DCAA5';
  if (tier === 'WARM') return '#FAC775';
  if (tier === 'COLD') return '#F09595';
  return '#888780';
}

function lsScoreBarColor(score) {
  if (score >= 70) return '#5DCAA5';
  if (score >= 45) return '#FAC775';
  if (score >= 25) return '#F09595';
  return '#888780';
}

function lsBucket(r) {
  const s = r.score;
  const t = r.tier;
  const d = r.follow_up_days;
  if (t === 'HOT' || s >= 70 || d <= 1) return 'today';
  if (t === 'WARM' || s >= 45 || d <= 7) return 'week';
  return 'low';
}

async function fetchLeadScore(lead, catalogShort) {
  const res = await fetch('/api/lead-score', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      lead,
      ...(typeof catalogShort === 'string' && catalogShort.trim()
        ? { catalogShort: catalogShort.trim() }
        : {})
    })
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    const msg = data.error?.message || (typeof data.error === 'string' ? data.error : null) || `Error ${res.status}`;
    throw new Error(msg);
  }
  return data.result;
}

function logActivity(module, action, meta) {
  fetch('/api/log', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ module, action, meta })
  }).catch(() => {});
}

/** Guarda generado en Neon. Devuelve `entry` (con `id`) o null. */
async function persistGenerated(payload) {
  try {
    const res = await fetch('/api/generated', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) return null;
    return data.entry ?? null;
  } catch {
    return null;
  }
}

async function saveGeneratedUpdate(id, patch) {
  const res = await fetch('/api/generated', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, ...patch })
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    throw new Error(data.error?.message || `Error ${res.status}`);
  }
  return data.entry;
}

function generatedEntryToResult(entry, variant) {
  if (!entry) return '';
  if (variant === 'email') {
    return JSON.stringify({
      subject: entry.subject || '',
      html: entry.bodyHtml || '',
      text: entry.bodyPlain || ''
    });
  }
  return entry.bodyHtml || '';
}

// ── Copy button ────────────────────────────────────────────────
function CopyBtn({ text }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };
  return (
    <button className={`btn-copy ${copied ? 'copied' : ''}`} onClick={copy}>
      {copied ? '✓ Copiado' : 'Copiar texto'}
    </button>
  );
}

// ── Output block (vista previa HTML + pestañas + edición guardada en Neon) ─────────────────
function OutputBlock({
  result,
  loading,
  error,
  variant = 'article',
  savedEntryId = null,
  onPersisted = null
}) {
  const [tab, setTab] = useState('preview');
  const [htmlCopied, setHtmlCopied] = useState(false);
  const [editing, setEditing] = useState(false);
  const [draftSubj, setDraftSubj] = useState('');
  const [draftHtmlEmail, setDraftHtmlEmail] = useState('');
  const [draftPlain, setDraftPlain] = useState('');
  const [draftArticle, setDraftArticle] = useState('');
  const [saving, setSaving] = useState(false);
  const [saveMsg, setSaveMsg] = useState('');
  const [saveErr, setSaveErr] = useState('');

  const emailPayload = useMemo(() => {
    if (variant !== 'email' || !result) return null;
    return parseEmailJson(result);
  }, [variant, result]);

  const htmlSource = useMemo(() => {
    if (!result) return '';
    if (variant === 'email' && emailPayload) return emailPayload.html;
    return coerceContentToHtml(result);
  }, [variant, result, emailPayload]);

  const previewSrcDoc = useMemo(() => wrapPreviewDoc(htmlSource || '<p></p>'), [htmlSource]);

  const plainText = useMemo(() => {
    if (variant === 'email' && emailPayload) return emailPayload.text || stripHtmlTags(emailPayload.html);
    return stripHtmlTags(coerceContentToHtml(result || ''));
  }, [variant, result, emailPayload]);

  const previewHtmlLive = useMemo(() => {
    if (editing && variant === 'email') return draftHtmlEmail || '<p></p>';
    if (editing && variant === 'article') return coerceContentToHtml(draftArticle || '');
    return htmlSource || '<p></p>';
  }, [editing, variant, draftHtmlEmail, draftArticle, htmlSource]);

  const previewSrcDocLive = useMemo(
    () => wrapPreviewDoc(previewHtmlLive || '<p></p>'),
    [previewHtmlLive]
  );

  const plainLive = useMemo(() => {
    if (editing && variant === 'email') return draftPlain;
    return plainText;
  }, [editing, variant, draftPlain, plainText]);

  useEffect(() => {
    setEditing(false);
    setSaveMsg('');
    setSaveErr('');
  }, [result]);

  const copyHtml = () => {
    const src = editing && variant === 'email' ? draftHtmlEmail : editing && variant === 'article' ? coerceContentToHtml(draftArticle) : htmlSource;
    navigator.clipboard.writeText(src).then(() => {
      setHtmlCopied(true);
      setTimeout(() => setHtmlCopied(false), 2000);
    });
  };

  const openEdit = () => {
    if (variant === 'email' && emailPayload) {
      setDraftSubj(emailPayload.subject || '');
      setDraftHtmlEmail(emailPayload.html || '');
      setDraftPlain(emailPayload.text || '');
    } else if (variant === 'article') {
      setDraftArticle(result || '');
    }
    setEditing(true);
    setSaveMsg('');
    setSaveErr('');
  };

  const cancelEdit = () => {
    setEditing(false);
    setSaveErr('');
  };

  const persistSave = async () => {
    if (!savedEntryId) {
      setSaveErr('Sin ID en base de datos: el guardado inicial falló (¿Neon / DATABASE_URL?)');
      return;
    }
    setSaving(true);
    setSaveErr('');
    setSaveMsg('');
    try {
      const patch =
        variant === 'email'
          ? {
              bodyHtml: draftHtmlEmail,
              bodyPlain: draftPlain,
              subject: draftSubj
            }
          : { bodyHtml: String(draftArticle || '').trim() };
      const entry = await saveGeneratedUpdate(savedEntryId, patch);
      if (onPersisted) onPersisted(entry);
      setEditing(false);
      setSaveMsg('Guardado.');
      logActivity('generated', 'update', { id: savedEntryId, variant });
      setTimeout(() => setSaveMsg(''), 3500);
    } catch (e) {
      setSaveErr(e.message || 'Error al guardar.');
    }
    setSaving(false);
  };

  if (loading) return (
    <div className="output-card">
      <div className="loading">
        <div className="spinner" />
        Generando con IA...
      </div>
    </div>
  );
  if (error) return (
    <div className="output-card" style={{borderLeft:'3px solid #E24B4A'}}>
      <div className="output-label" style={{color:'#E24B4A'}}>ERROR</div>
      <div className="output-text" style={{color:'#F09595'}}>{error}</div>
    </div>
  );
  if (!result) return null;

  if (variant === 'email' && !emailPayload) {
    return (
      <div className="output-card" style={{borderLeft:'3px solid #f59e0b'}}>
        <div className="output-label" style={{color:'#fbbf24'}}>RESPUESTA NO VÁLIDA</div>
        <div className="output-text" style={{fontSize:12,color:'#cbd5e1'}}>
          Se esperaba un JSON con <code style={{color:'#fff'}}>subject</code>, <code style={{color:'#fff'}}>html</code> y <code style={{color:'#fff'}}>text</code>. Respuesta cruda:
        </div>
        <pre className="output-code" style={{marginTop:12}}>{result}</pre>
        <div className="output-actions">
          <CopyBtn text={result} />
        </div>
      </div>
    );
  }

  const showEditBtn = variant === 'email' ? !!emailPayload : variant === 'article';

  return (
    <div className="output-card">
      <div className="output-toolbar">
        <div className="output-label" style={{ marginBottom: 0 }}>RESULTADO</div>
        {variant === 'email' && emailPayload?.subject && !editing && (
          <div className="email-subject-preview">
            <span className="email-subject-label">Asunto del correo</span>
            <span>{emailPayload.subject}</span>
          </div>
        )}
        {showEditBtn && (
          <button
            type="button"
            className="btn-copy"
            style={{ marginLeft: 'auto' }}
            onClick={() => (editing ? cancelEdit() : openEdit())}
          >
            {editing ? 'Cerrar edición' : 'Editar'}
          </button>
        )}
      </div>

      {editing && (
        <div className="output-edit-panel">
          {variant === 'email' && (
            <>
              <label>Asunto</label>
              <input
                value={draftSubj}
                onChange={(e) => setDraftSubj(e.target.value)}
              />
              <label>HTML del cuerpo (&lt;article&gt;…)</label>
              <textarea
                value={draftHtmlEmail}
                onChange={(e) => setDraftHtmlEmail(e.target.value)}
                rows={12}
              />
              <label>Texto plano</label>
              <textarea
                value={draftPlain}
                onChange={(e) => setDraftPlain(e.target.value)}
                rows={8}
              />
            </>
          )}
          {variant === 'article' && (
            <>
              <label>HTML del contenido</label>
              <textarea
                value={draftArticle}
                onChange={(e) => setDraftArticle(e.target.value)}
                rows={18}
              />
            </>
          )}
          <div className="output-save-row">
            <button
              type="button"
              className="btn btn-primary"
              style={{ fontSize: 12, padding: '8px 16px', background: 'var(--accent)', color: '#fff', border: 'none', borderRadius: 8, cursor: saving ? 'wait' : 'pointer' }}
              onClick={persistSave}
              disabled={saving}
            >
              {saving ? 'Guardando…' : 'Guardar versión en base de datos'}
            </button>
            {!savedEntryId && (
              <span className="output-save-msg err">
                Genera de nuevo con la API y BD activa para poder guardar ediciones.
              </span>
            )}
            {saveMsg && <span className="output-save-msg ok">{saveMsg}</span>}
            {saveErr && <span className="output-save-msg err">{saveErr}</span>}
          </div>
          <div style={{ marginTop: 14 }}>
            <div className="output-label" style={{ marginBottom: 8 }}>Vista previa (borrador)</div>
            <iframe className="preview-frame" title="Vista previa edición" sandbox srcDoc={previewSrcDocLive} />
          </div>
        </div>
      )}

      {!editing && (
        <>
          <div className="output-tabs">
            <button type="button" className={`output-tab ${tab === 'preview' ? 'active' : ''}`} onClick={() => setTab('preview')}>Vista previa</button>
            <button type="button" className={`output-tab ${tab === 'html' ? 'active' : ''}`} onClick={() => setTab('html')}>HTML / fuente</button>
            <button type="button" className={`output-tab ${tab === 'plain' ? 'active' : ''}`} onClick={() => setTab('plain')}>Texto plano</button>
          </div>

          {tab === 'preview' && (
            <iframe className="preview-frame" title="Vista previa" sandbox srcDoc={previewSrcDoc} />
          )}
          {tab === 'html' && (
            <pre className="output-code">{htmlSource}</pre>
          )}
          {tab === 'plain' && (
            <div className="output-text output-plain">{plainText}</div>
          )}
        </>
      )}

      <div className="output-actions">
        <CopyBtn text={plainLive} />
        <button type="button" className={`btn-copy ${htmlCopied ? 'copied' : ''}`} onClick={copyHtml}>
          {htmlCopied ? '✓ HTML copiado' : 'Copiar HTML'}
        </button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// MÓDULO 1 — Email de primer contacto (HTML + webhook)
// ══════════════════════════════════════════════════════════════
function Module1({ apiKey }) {
  const { catalog } = usePixelcomCatalog();
  const [crmContacts, setCrmContacts] = useState([]);
  const [crmPickId, setCrmPickId] = useState('');
  const [outputLanguage, setOutputLanguage] = useState('frances');
  const [form, setForm] = useState({
    nombre: '', empresa: '', emailProspecto: '', pais: 'Francia', tipo: 'nueva_instalacion',
    producto: 'pixeltiming', contexto: ''
  });
  const [result, setResult] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [sending, setSending] = useState(false);
  const [webhookError, setWebhookError] = useState('');
  const [webhookOk, setWebhookOk] = useState(false);
  const [savedGenId, setSavedGenId] = useState(null);

  const emailParsed = useMemo(() => (result ? parseEmailJson(result) : null), [result]);

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const res = await fetch('/api/crm');
        const data = await res.json().catch(() => ({}));
        if (!res.ok) return;
        if (!cancelled && Array.isArray(data.contacts)) {
          setCrmContacts(data.contacts);
        }
      } catch {
        /* ignore */
      }
    })();
    return () => {
      cancelled = true;
    };
  }, []);

  const applyCrmPick = (id) => {
    const c = crmContacts.find((x) => x.id === id);
    if (!c) return;
    set('nombre', c.nombre || '');
    set('empresa', c.empresa || '');
    if (c.email) set('emailProspecto', c.email);
    if (c.pais) set('pais', c.pais);
    if (c.notas) set('contexto', c.notas);
  };

  const isPaisOtro = String(form.pais || '').toLowerCase() === 'otro';
  const [paisManual, setPaisManual] = useState('');

  const tiposInstalacion = [
    { value: 'nueva_instalacion', label: 'Nueva apertura de karting' },
    { value: 'renovacion', label: 'Renovación de instalación existente' },
    { value: 'circuito_velocidad', label: 'Circuito de velocidad' },
    { value: 'consultor', label: 'Consultor / proyectista de circuitos' },
  ];
  const productos = catalog.commercialProducts;

  const langLabel = outputLanguageLabel(outputLanguage);
  const sig = SIGNATURE_HINT[outputLanguage] || SIGNATURE_HINT.espanol;

  const generate = async () => {
    if (!form.nombre || !form.empresa) { setError('Nombre y empresa son obligatorios.'); return; }
    setLoading(true); setError(''); setResult(''); setSavedGenId(null); setWebhookError(''); setWebhookOk(false);
    const paisFinal = isPaisOtro ? (paisManual || '').trim() : String(form.pais || '').trim();
    const system = `Eres el asistente comercial de Pixelcom Ingeniería, empresa española especializada en sistemas de cronometraje y señalización para karting y circuitos de velocidad (marcas Pixeltiming y Pixelmotorsport). Redactas correos electrónicos profesionales en ${langLabel}. El tono es cercano pero técnico, confiado, breve y orientado a resultados. Evita plantillas genéricas. ${sig}

${catalog.fullText}`;
    const user = `Redacta un email de primer contacto en ${langLabel} para:
- Nombre contacto: ${form.nombre}
- Empresa: ${form.empresa}
- País: ${paisFinal || 'no indicado'}
- Tipo de instalación / perfil: ${tiposInstalacion.find(t=>t.value===form.tipo)?.label}
- Producto de interés: ${productLineLabel(productos, form.producto)}
- Contexto adicional: ${form.contexto || 'ninguno'}

El correo debe: presentar brevemente Pixelcom, destacar el modelo All-in-One como diferencial, hacer una pregunta de apertura relevante para su perfil y proponer una llamada o demo. Máximo 180 palabras en el cuerpo.

Responde ÚNICAMENTE con un JSON válido (sin markdown, sin texto antes ni después) con esta forma exacta:
{"subject":"...","html":"<article>...</article>","text":"..."}

Reglas:
- "subject": una sola línea, asunto del email.
- "html": fragmento HTML dentro de <article>...</article> usando <p>, <ul><li> si aplica, <strong> para énfasis. Sin <style>, sin <script>, sin iframes.
- "text": misma carta en texto plano con saltos de línea, sin HTML.`;
    try {
      const text = await callClaude(apiKey, system, user);
      setResult(text);
      logActivity('email', 'generate', { empresa: form.empresa, outputLanguage });
      const parsed = parseEmailJson(text);
      if (parsed) {
        const entry = await persistGenerated({
          kind: 'prospect_email',
          outputLanguage,
          input: { ...form },
          bodyHtml: parsed.html,
          bodyPlain: parsed.text,
          subject: parsed.subject
        });
        if (entry?.id) setSavedGenId(entry.id);
      }
    } catch(e) { setError(e.message); }
    setLoading(false);
  };

  const sendWebhook = async () => {
    const to = (form.emailProspecto || '').trim();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(to)) {
      setWebhookError('Introduce un correo electrónico válido del destinatario.');
      return;
    }
    if (!emailParsed) {
      setWebhookError('Genera primero un correo válido (JSON con asunto y HTML).');
      return;
    }
    setSending(true); setWebhookError(''); setWebhookOk(false);
    try {
      await sendEmailWebhook({
        to,
        subject: emailParsed.subject,
        html: emailParsed.html,
        text: emailParsed.text
      });
      setWebhookOk(true);
      setTimeout(() => setWebhookOk(false), 4000);
    } catch (e) {
      setWebhookError(e.message || 'Error al enviar al webhook.');
    }
    setSending(false);
  };

  return (
    <div>
      <div className="module-header">
        <div className="module-tag">CASO DE USO 1 · COMERCIAL</div>
        <div className="module-title">Email de primer contacto</div>
        <div className="module-desc">Elige el idioma de salida en el formulario, previsualiza el correo como HTML y envíalo a tu automatización mediante webhook (<code style={{fontSize:12}}>WEBHOOK_URL</code> en el servidor).</div>
      </div>

      <div className="stats-row">
        <div className="stat-card">
          <div className="stat-label">Tiempo manual actual</div>
          <div className="stat-value">15-20 min</div>
          <div className="stat-sub">por email comercial</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Tiempo con IA</div>
          <div className="stat-value">&lt;2 min</div>
          <div className="stat-sub">revisión + envío</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Mercado objetivo</div>
          <div className="stat-value">160k€</div>
          <div className="stat-sub">referencia Francia</div>
        </div>
      </div>

      <div className="card">
        <div className="card-title">Datos del prospecto</div>
        <div className="form-grid">
          <div className="field" style={{gridColumn:'span 2'}}>
            <label>Elegir contacto del CRM (opcional)</label>
            <select
              value={crmPickId}
              onChange={(e) => {
                const v = e.target.value;
                setCrmPickId(v);
                if (v) applyCrmPick(v);
              }}
            >
              <option value="">—</option>
              {crmContacts.map((c) => (
                <option key={c.id} value={c.id}>
                  {(c.empresa || '—') + ' · ' + (c.nombre || '—')}
                </option>
              ))}
            </select>
          </div>
          <div className="field" style={{gridColumn:'span 2'}}>
            <label>Idioma de salida del correo</label>
            <select value={outputLanguage} onChange={(e) => setOutputLanguage(e.target.value)}>
              {OUTPUT_LANGS.map((l) => (
                <option key={l.value} value={l.value}>{l.label}</option>
              ))}
            </select>
          </div>
          <div className="field">
            <label>Nombre del contacto *</label>
            <input value={form.nombre} onChange={e=>set('nombre',e.target.value)} placeholder="Jean-Pierre Moreau" />
          </div>
          <div className="field">
            <label>Empresa *</label>
            <input value={form.empresa} onChange={e=>set('empresa',e.target.value)} placeholder="Karting de Lyon" />
          </div>
          <div className="field" style={{gridColumn:'span 2'}}>
            <label>Correo electrónico del destinatario (para webhook)</label>
            <input type="email" value={form.emailProspecto} onChange={e=>set('emailProspecto',e.target.value)} placeholder="contacto@empresa.com" />
          </div>
          <div className="field">
            <label>País</label>
            <select value={form.pais} onChange={e=>set('pais',e.target.value)}>
              <option>Francia</option>
              <option>España</option>
              <option>Bélgica</option>
              <option>Países Bajos</option>
              <option>Suiza</option>
              <option>Luxemburgo</option>
              <option>Reino Unido</option>
              <option>Estados Unidos</option>
              <option>Italia</option>
              <option>Alemania</option>
              <option>Portugal</option>
              <option>Otro</option>
            </select>
          </div>
          {isPaisOtro && (
            <div className="field">
              <label>País (manual)</label>
              <input
                value={paisManual}
                onChange={(e) => setPaisManual(e.target.value)}
                placeholder="Ej.: Marruecos"
              />
            </div>
          )}
          <div className="field">
            <label>Perfil / tipo de instalación</label>
            <select value={form.tipo} onChange={e=>set('tipo',e.target.value)}>
              {tiposInstalacion.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}
            </select>
          </div>
          <div className="field">
            <label>Producto de interés</label>
            <select value={form.producto} onChange={e=>set('producto',e.target.value)}>
              {productos.map((p) => (
                <option key={p.value} value={p.value}>{p.label}</option>
              ))}
            </select>
          </div>
          <div className="field">
            <label>Contexto adicional (opcional)</label>
            <input value={form.contexto} onChange={e=>set('contexto',e.target.value)} placeholder="Lo conocimos en feria Offenbach..." />
          </div>
        </div>
      </div>

      <button className="btn btn-primary" onClick={generate} disabled={loading}>
        {loading ? 'Generando...' : 'Generar correo'}
      </button>

      <OutputBlock
        result={result}
        loading={loading}
        error={error}
        variant="email"
        savedEntryId={savedGenId}
        onPersisted={(entry) =>
          entry && setResult(generatedEntryToResult(entry, 'email'))
        }
      />

      <div className="card" style={{marginTop:20}}>
        <div className="card-title">Enviar al webhook</div>
        <p style={{fontSize:12,color:'var(--text-muted)',marginBottom:12,lineHeight:1.6}}>
          El servidor reenvía un POST JSON a <code style={{fontSize:11}}>WEBHOOK_URL</code> con <code style={{fontSize:11}}>to</code>, <code style={{fontSize:11}}>subject</code>, <code style={{fontSize:11}}>html</code> y <code style={{fontSize:11}}>text</code>. Opcional: cabecera <code style={{fontSize:11}}>x-webhook-secret</code> si defines <code style={{fontSize:11}}>WEBHOOK_SECRET</code>.
        </p>
        <button type="button" className="btn btn-secondary" onClick={sendWebhook} disabled={sending || !result}>
          {sending ? 'Enviando…' : 'Enviar al webhook'}
        </button>
        {webhookOk && <div className="webhook-status ok">Enviado correctamente.</div>}
        {webhookError && <div className="webhook-status err">{webhookError}</div>}
      </div>
    </div>
  );
}

// MÓDULO 2 — Generador de contenidos SEO
// ══════════════════════════════════════════════════════════════
function Module2({ apiKey }) {
  const { catalog } = usePixelcomCatalog();
  const [outputLanguage, setOutputLanguage] = useState('frances');
  const [form, setForm] = useState({
    tema: '', linea: 'pixeltiming',
    tipo: 'articulo_blog', keywords: '', publico: 'propietario_karting'
  });
  const [result, setResult] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [savedGenId, setSavedGenId] = useState(null);

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const tipos = [
    { value: 'articulo_blog', label: 'Artículo de blog (800-1000 palabras)' },
    { value: 'descripcion_producto', label: 'Descripción de producto para web' },
    { value: 'faq', label: 'Página FAQ técnica' },
    { value: 'caso_exito', label: 'Caso de éxito de cliente' },
  ];
  const publicos = [
    { value: 'propietario_karting', label: 'Propietario de karting' },
    { value: 'gestor_circuito', label: 'Gestor de circuito de velocidad' },
    { value: 'consultor', label: 'Consultor / proyectista' },
    { value: 'administracion', label: 'Administración pública' },
  ];
  const generate = async () => {
    if (!form.tema) { setError('El tema es obligatorio.'); return; }
    setLoading(true); setError(''); setResult(''); setSavedGenId(null);

    const idiomaLabel = outputLanguageLabel(outputLanguage);
    const system = `Eres experto en marketing de contenidos B2B para el sector de tecnología deportiva. Trabajas para Pixelcom Ingeniería, empresa española líder en sistemas de cronometraje para karting (Pixeltiming) y señalización para circuitos de velocidad (Pixelmotorsport). Redactas contenido en ${idiomaLabel} de alta calidad, optimizado para SEO, con tono técnico pero accesible. El diferencial de Pixelcom es su modelo All-in-One: hardware + software + soporte integrados, sin cuotas mensuales.

${catalog.fullText}`;

    const tipoLabel = tipos.find(t=>t.value===form.tipo)?.label;
    const publicoLabel = publicos.find(p=>p.value===form.publico)?.label;
    const lineaLabel = productLineLabel(catalog.commercialProducts, form.linea);

    const user = `Crea el siguiente contenido en ${idiomaLabel}:

Tipo: ${tipoLabel}
Tema / título sugerido: ${form.tema}
Línea de producto: ${lineaLabel}
Público objetivo: ${publicoLabel}
Keywords a incluir: ${form.keywords || 'las más relevantes del sector'}

Incluye:
1. Título SEO optimizado (H1)
2. Metadescripción (155 caracteres max)
3. Cuerpo completo con subtítulos H2/H3
4. Llamada a la acción al final

Tono profesional, orientado a beneficios, con datos técnicos precisos cuando sea relevante.

Entrega el resultado ÚNICAMENTE como fragmento HTML (sin markdown, sin bloques de código, sin explicación previa): usa h1, h2, h3, p, ul, ol, li, strong, em. Incluye la metadescripción en un párrafo inicial con <strong>Metadescripción</strong> seguido del texto. No uses <script> ni estilos incrustados complejos.`;

    try {
      const text = await callClaude(apiKey, system, user);
      setResult(text);
      logActivity('contenidos', 'generate', { tema: form.tema, outputLanguage });
      const entry = await persistGenerated({
        kind: 'seo',
        outputLanguage,
        input: { ...form },
        bodyHtml: text
      });
      if (entry?.id) setSavedGenId(entry.id);
    } catch(e) { setError(e.message); }
    setLoading(false);
  };

  return (
    <div>
      <div className="module-header">
        <div className="module-tag">CASO DE USO 3 · CONTENIDOS</div>
        <div className="module-title">Generador de contenidos SEO</div>
        <div className="module-desc">Produce artículos, descripciones de producto y FAQs en el idioma que elijas abajo. Vista previa en HTML.</div>
      </div>

      <div className="stats-row">
        <div className="stat-card">
          <div className="stat-label">Contenidos FR actuales</div>
          <div className="stat-value">~0</div>
          <div className="stat-sub">por mes</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Objetivo con IA</div>
          <div className="stat-value">8-16</div>
          <div className="stat-sub">piezas por mes</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Tiempo por artículo</div>
          <div className="stat-value">30 min</div>
          <div className="stat-sub">vs. 4-6h manual</div>
        </div>
      </div>

      <div className="card">
        <div className="card-title">Configuración del contenido</div>
        <div className="form-grid">
          <div className="field" style={{gridColumn:'span 2'}}>
            <label>Tema o título del contenido *</label>
            <input value={form.tema} onChange={e=>set('tema',e.target.value)} placeholder="Cómo elegir el sistema de cronometraje para tu karting en 2025" />
          </div>
          <div className="field">
            <label>Idioma de salida</label>
            <select value={outputLanguage} onChange={(e) => setOutputLanguage(e.target.value)}>
              {OUTPUT_LANGS.map((l) => (
                <option key={l.value} value={l.value}>{l.label}</option>
              ))}
            </select>
          </div>
          <div className="field">
            <label>Tipo de contenido</label>
            <select value={form.tipo} onChange={e=>set('tipo',e.target.value)}>
              {tipos.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}
            </select>
          </div>
          <div className="field">
            <label>Línea de producto</label>
            <select value={form.linea} onChange={e=>set('linea',e.target.value)}>
              {catalog.commercialProducts.map((p) => (
                <option key={p.value} value={p.value}>{p.label}</option>
              ))}
            </select>
          </div>
          <div className="field">
            <label>Público objetivo</label>
            <select value={form.publico} onChange={e=>set('publico',e.target.value)}>
              {publicos.map(p=><option key={p.value} value={p.value}>{p.label}</option>)}
            </select>
          </div>
          <div className="field" style={{gridColumn:'span 2'}}>
            <label>Keywords SEO objetivo (opcional)</label>
            <input value={form.keywords} onChange={e=>set('keywords',e.target.value)} placeholder="chronométrage karting, logiciel karting, système karting..." />
          </div>
        </div>
      </div>

      <button className="btn btn-primary" onClick={generate} disabled={loading}>
        {loading ? 'Generando...' : 'Generar contenido'}
      </button>

      <OutputBlock
        result={result}
        loading={loading}
        error={error}
        variant="article"
        savedEntryId={savedGenId}
        onPersisted={(entry) =>
          entry && setResult(generatedEntryToResult(entry, 'article'))
        }
      />
    </div>
  );
}
