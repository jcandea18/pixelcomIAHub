[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200
  force = true
  methods = ["POST", "OPTIONS"]

[[redirects]]
  from = "/api/webhook-email"
  to = "/.netlify/functions/webhook-email"
  status = 200
  force = true
  methods = ["POST", "OPTIONS"]

[[redirects]]
  from = "/api/lead-score"
  to = "/.netlify/functions/lead-score"
  status = 200
  force = true
  methods = ["POST", "OPTIONS"]

[[redirects]]
  from = "/api/leads"
  to = "/.netlify/functions/leads"
  status = 200
  force = true
  methods = ["GET", "POST", "DELETE", "OPTIONS"]

[[redirects]]
  from = "/api/log"
  to = "/.netlify/functions/log"
  status = 200
  force = true
  methods = ["POST", "OPTIONS"]

[[redirects]]
  from = "/api/generated"
  to = "/.netlify/functions/generated"
  status = 200
  force = true
  methods = ["GET", "POST", "OPTIONS"]

[[redirects]]
  from = "/api/activity"
  to = "/.netlify/functions/activity"
  status = 200
  force = true
  methods = ["GET", "OPTIONS"]

[[redirects]]
  from = "/api/crm/enrich"
  to = "/.netlify/functions/crm-enrich"
  status = 200
  force = true
  methods = ["POST", "OPTIONS"]

[[redirects]]
  from = "/api/crm"
  to = "/.netlify/functions/crm"
  status = 200
  force = true
  methods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
